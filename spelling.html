<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Spelling Quiz</title>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>
  <div id="global-overlay" class="global-overlay" hidden></div>
  <div id="app-shell" class="app-shell">

    <header class="top-bar">
      <div class="top-bar-left"></div>
      <div class="top-bar-right">
        <button id="hamburger-menu-button" class="hamburger-menu-button" type="button"
          aria-label="Open navigation menu" aria-expanded="false" aria-controls="mobile-navigation-drawer">
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
        </button>
      </div>
    </header>

    <nav id="mobile-navigation-drawer" class="mobile-navigation-drawer" aria-label="Main navigation" hidden>
      <div class="mobile-navigation-header"><h2 class="mobile-navigation-title">Menu</h2></div>
      <ul class="mobile-navigation-list">
        <li><a href="index.html">Home</a></li>
        <li><a href="streaks.html">Streaks</a></li>
        <li><a href="health.html">Health</a></li>
        <li><a href="history.html">History</a></li>
        <li><a href="notes.html">Notes</a></li>
        <li><a href="add.html">Add</a></li>
        <li><a href="spelling.html">Spelling Quiz</a></li>
        <li><a href="turkish.html">Turkish Stories</a></li>
        <li><a href="conversation.html">Turkish Chat</a></li>
      </ul>
    </nav>

    <main class="home-page-main-content">

      <section class="dashboard-card">
        <h1 class="card-title">Spelling Quiz</h1>
        <p style="font-size:13px;opacity:0.7;margin:0;">Press Play to hear a word. Type it below and submit your answer.</p>
      </section>

      <!-- Score -->
      <section class="dashboard-card" style="display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:14px;">Score: <strong id="quiz-score">0</strong> / <strong id="quiz-total">0</strong></span>
        <button type="button" class="secondary-action-button" id="quiz-reset-btn">Reset</button>
      </section>

      <!-- Quiz card -->
      <section class="dashboard-card" id="quiz-card">
        <div style="text-align:center;margin-bottom:14px;">
          <button type="button" class="primary-action-button" id="quiz-play-btn" style="font-size:18px;padding:12px 24px;">
            ▶ Play Word
          </button>
        </div>

        <div id="quiz-result" style="text-align:center;font-size:32px;min-height:40px;margin-bottom:10px;"></div>

        <input type="text" id="quiz-answer-input"
          placeholder="Type the word here..."
          autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
          style="width:100%;padding:10px;border-radius:10px;border:1px solid #b0977a;font-size:16px;box-sizing:border-box;margin-bottom:10px;">

        <div style="display:flex;gap:8px;justify-content:flex-end;">
          <button type="button" class="primary-action-button" id="quiz-submit-btn">Submit</button>
          <button type="button" class="secondary-action-button" id="quiz-next-btn">Next Word</button>
        </div>
      </section>

      <!-- Word difficulty -->
      <section class="dashboard-card">
        <h2 class="card-title">Difficulty</h2>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button type="button" class="secondary-action-button quiz-diff-btn" data-diff="easy">Easy</button>
          <button type="button" class="secondary-action-button quiz-diff-btn" data-diff="medium">Medium</button>
          <button type="button" class="secondary-action-button quiz-diff-btn" data-diff="hard">Hard</button>
        </div>
      </section>

    </main>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/labels.js"></script>
  <script src="js/config.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/spelling.js"></script>
</body>
</html>
