<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Turkish Stories</title>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>
  <div id="global-overlay" class="global-overlay" hidden></div>
  <div id="app-shell" class="app-shell">

    <header class="top-bar">
      <div class="top-bar-left"></div>
      <div class="top-bar-right">
        <button id="hamburger-menu-button" class="hamburger-menu-button" type="button"
          aria-label="Open navigation menu" aria-expanded="false" aria-controls="mobile-navigation-drawer">
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
        </button>
      </div>
    </header>

    <nav id="mobile-navigation-drawer" class="mobile-navigation-drawer" aria-label="Main navigation" hidden>
      <div class="mobile-navigation-header"><h2 class="mobile-navigation-title">Menu</h2></div>
      <ul class="mobile-navigation-list">
        <li><a href="index.html">Home</a></li>
        <li><a href="streaks.html">Streaks</a></li>
        <li><a href="health.html">Health</a></li>
        <li><a href="history.html">History</a></li>
        <li><a href="notes.html">Notes</a></li>
        <li><a href="add.html">Add</a></li>
        <li><a href="spelling.html">Spelling Quiz</a></li>
        <li><a href="turkish.html">Turkish Stories</a></li>
        <li><a href="conversation.html">Turkish Chat</a></li>
      </ul>
    </nav>

    <main class="home-page-main-content">

      <section class="dashboard-card">
        <h1 class="card-title">Turkish Stories</h1>
        <p style="font-size:13px;opacity:0.7;margin:0;">Generate a short Turkish story to practice reading. Hold-press words to translate.</p>
      </section>

      <!-- Story settings -->
      <section class="dashboard-card">
        <h2 class="card-title">Story Settings</h2>

        <label style="display:block;font-size:13px;margin-bottom:6px;">Topic:
          <input type="text" id="story-topic" placeholder="e.g. going to the market, a rainy day..."
            style="width:100%;margin-top:4px;padding:8px;border-radius:8px;border:1px solid #b0977a;font-size:14px;box-sizing:border-box;">
        </label>

        <label style="display:block;font-size:13px;margin-bottom:6px;">Tense:
          <select id="story-tense" style="width:100%;margin-top:4px;padding:8px;border-radius:8px;border:1px solid #b0977a;font-size:14px;box-sizing:border-box;background:white;">
            <option value="present">Present (şimdiki zaman)</option>
            <option value="past">Past (geçmiş zaman)</option>
            <option value="future">Future (gelecek zaman)</option>
            <option value="mixed">Mixed</option>
          </select>
        </label>

        <label style="display:block;font-size:13px;margin-bottom:6px;">Difficulty:
          <select id="story-difficulty" style="width:100%;margin-top:4px;padding:8px;border-radius:8px;border:1px solid #b0977a;font-size:14px;box-sizing:border-box;background:white;">
            <option value="beginner">Beginner (A1)</option>
            <option value="elementary">Elementary (A2)</option>
            <option value="intermediate">Intermediate (B1)</option>
          </select>
        </label>

        <label style="display:block;font-size:13px;margin-bottom:10px;">Extra info (optional):
          <input type="text" id="story-extra" placeholder="e.g. include a market seller character..."
            style="width:100%;margin-top:4px;padding:8px;border-radius:8px;border:1px solid #b0977a;font-size:14px;box-sizing:border-box;">
        </label>

        <button type="button" class="primary-action-button" id="story-generate-btn" style="width:100%;padding:12px;">
          Generate Story
        </button>
      </section>

      <!-- Generated story -->
      <section class="dashboard-card" id="story-output-section" hidden>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <h2 class="card-title" style="margin:0;">Story</h2>
          <button type="button" class="secondary-action-button" id="story-read-btn" style="font-size:12px;">🔊 Read Aloud</button>
        </div>
        <div id="story-text" style="font-size:15px;line-height:1.8;margin-bottom:14px;"></div>

        <h2 class="card-title">Vocabulary</h2>
        <div id="story-vocab" style="font-size:14px;line-height:1.8;"></div>

        <h2 class="card-title" style="margin-top:12px;">Quiz Questions</h2>
        <div id="story-quiz" style="font-size:14px;"></div>
        <div id="quiz-answers" style="margin-top:8px;"></div>
        <button type="button" class="secondary-action-button" id="show-answers-btn" style="margin-top:6px;font-size:12px;" hidden>Show Answers</button>
      </section>

    </main>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/labels.js"></script>
  <script src="js/config.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/brain-parser.js"></script>
  <script src="js/turkish.js"></script>
</body>
</html>
