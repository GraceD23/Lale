<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Work</title>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components-additions.css" />
  <style>
    /* ---- Work page specific ---- */
    .work-section { margin-bottom: 12px; }

    .etsy-toggle {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: none;
      border: none;
      font-family: 'Josefin Sans', sans-serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--title-color);
      cursor: pointer;
      padding: 0;
    }

    .etsy-chevron {
      font-size: 14px;
      transition: transform 0.2s;
      color: var(--button-primary);
    }
    .etsy-chevron.open { transform: rotate(180deg); }

    .etsy-body { display: none; }
    .etsy-body.open { display: block; }

    /* ---- Beads to Paint box ---- */
    .beads-to-paint {
      background: rgba(255,255,255,0.5);
      border: 1.5px solid var(--border-soft);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 14px;
    }

    .beads-to-paint-title {
      font-family: 'Josefin Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--title-color);
      margin: 0 0 10px;
      letter-spacing: 0.03em;
    }

    .beads-to-paint-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .beads-col-label {
      font-family: 'Josefin Sans', sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: var(--button-primary);
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .beads-to-paint ul {
      list-style: disc;
      padding-left: 16px;
      margin: 0;
    }

    .beads-to-paint li {
      font-family: 'Josefin Sans', sans-serif;
      font-size: 13px;
      color: var(--text-main);
      margin-bottom: 3px;
      line-height: 1.4;
    }

    /* ---- Inner dropdowns ---- */
    .inner-dropdown {
      border-bottom: 1px solid var(--border-soft);
      padding: 10px 0;
    }

    .inner-dropdown:last-child { border-bottom: none; }

    .inner-toggle {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: none;
      border: none;
      font-family: 'Josefin Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--title-color);
      cursor: pointer;
      padding: 2px 0;
    }

    .inner-chevron {
      font-size: 12px;
      transition: transform 0.2s;
      color: var(--button-primary);
    }
    .inner-chevron.open { transform: rotate(180deg); }

    .inner-body { display: none; padding-top: 8px; }
    .inner-body.open { display: block; }

    /* ---- Sub-dropdowns (Classic / Neon inside Bead/Necklace) ---- */
    .sub-dropdown { padding: 6px 0; }

    .sub-toggle {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: none;
      border: none;
      font-family: 'Josefin Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--button-primary);
      cursor: pointer;
      padding: 2px 0;
    }

    .sub-chevron {
      font-size: 11px;
      transition: transform 0.2s;
    }
    .sub-chevron.open { transform: rotate(180deg); }

    .sub-body { display: none; padding-top: 6px; }
    .sub-body.open { display: block; }

    /* ---- Inventory lists ---- */
    .inv-list {
      list-style: disc;
      padding-left: 18px;
      margin: 0;
    }

    .inv-list li {
      font-family: 'Josefin Sans', sans-serif;
      font-size: 13px;
      color: var(--text-main);
      margin-bottom: 4px;
      line-height: 1.5;
      display: flex;
      justify-content: space-between;
      align-items: center;
      list-style: disc;
    }

    .inv-name { flex: 1; }
    .inv-count {
      font-weight: 600;
      color: var(--title-color);
      margin-left: 8px;
      min-width: 28px;
      text-align: right;
    }

    /* ---- Supplies ---- */
    .supplies-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .supplies-add-btn {
      background: none;
      border: 1.5px solid var(--border-soft);
      border-radius: 8px;
      width: 28px;
      height: 28px;
      font-size: 18px;
      color: var(--button-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Josefin Sans', sans-serif;
      line-height: 1;
    }

    .supply-edit-btn {
      width: 100%;
      margin-top: 12px;
      padding: 8px;
      border-radius: 10px;
      border: 1.5px solid var(--border-soft);
      background: none;
      font-family: 'Josefin Sans', sans-serif;
      font-size: 13px;
      color: var(--text-main);
      cursor: pointer;
    }

    /* ---- Input box ---- */
    .etsy-input-area {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-top: 8px;
    }

    .etsy-input-field {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1.5px solid var(--border-soft);
      font-family: 'Josefin Sans', sans-serif;
      font-size: 14px;
      color: var(--text-main);
      background: white;
      box-sizing: border-box;
      resize: none;
    }

    .etsy-input-field:focus {
      outline: none;
      border-color: var(--button-primary);
    }

    .etsy-submit-btn {
      align-self: flex-end;
      padding: 9px 24px;
      border-radius: 12px;
      border: none;
      background: var(--button-primary);
      color: white;
      font-family: 'Josefin Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    /* ---- Prompt overlay ---- */
    .etsy-prompt-overlay {
      position: fixed;
      inset: 0;
      background: rgba(60,47,38,0.5);
      z-index: 4000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .etsy-prompt-overlay.open { display: flex; }

    .etsy-prompt-box {
      background: #fdf8f3;
      border-radius: 18px;
      padding: 24px 20px;
      width: 100%;
      max-width: 340px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }

    .etsy-prompt-title {
      font-family: 'Josefin Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--title-color);
      margin: 0 0 6px;
    }

    .etsy-prompt-sub {
      font-family: 'Josefin Sans', sans-serif;
      font-size: 13px;
      color: var(--text-main);
      opacity: 0.7;
      margin: 0 0 16px;
    }

    .etsy-prompt-btns {
      display: flex;
      gap: 10px;
    }

    .etsy-prompt-btn {
      flex: 1;
      padding: 11px;
      border-radius: 12px;
      border: none;
      font-family: 'Josefin Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .etsy-prompt-btn.primary { background: var(--button-primary); color: white; }
    .etsy-prompt-btn.secondary { background: white; border: 1.5px solid var(--border-soft); color: var(--text-main); }

    /* ---- Low stock warning ---- */
    .inv-count.low { color: #c0392b; }

    /* ---- Edit overlay ---- */
    .edit-overlay {
      position: fixed;
      inset: 0;
      background: rgba(60,47,38,0.5);
      z-index: 4000;
      display: none;
      align-items: flex-end;
      justify-content: center;
    }

    .edit-overlay.open { display: flex; }

    .edit-box {
      background: #fdf8f3;
      border-radius: 20px 20px 0 0;
      padding: 24px 20px 40px;
      width: 100%;
      max-width: 480px;
      max-height: 70vh;
      overflow-y: auto;
      box-sizing: border-box;
    }

    .edit-box-title {
      font-family: 'Josefin Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--title-color);
      margin: 0 0 16px;
    }

    .edit-item-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid #e8ddd4;
    }

    .edit-item-name {
      flex: 1;
      font-family: 'Josefin Sans', sans-serif;
      font-size: 14px;
      color: var(--text-main);
    }

    .edit-remove-btn {
      background: none;
      border: none;
      font-size: 18px;
      color: #b0977a;
      cursor: pointer;
      padding: 4px;
    }

    .edit-close-btn {
      width: 100%;
      margin-top: 16px;
      padding: 10px;
      border-radius: 12px;
      border: 1.5px solid var(--border-soft);
      background: none;
      font-family: 'Josefin Sans', sans-serif;
      font-size: 13px;
      color: var(--text-main);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="global-overlay" class="global-overlay" hidden></div>
  <div id="app-shell" class="app-shell">

    <header class="top-bar">
      <div class="top-bar-left"></div>
      <div class="top-bar-right">
        <button id="hamburger-menu-button" class="hamburger-menu-button" type="button"
          aria-label="Open navigation menu" aria-expanded="false" aria-controls="mobile-navigation-drawer">
          <span class="hamburger-line" style="display:block;width:100%;height:3px;background-color:#3a2e28;border-radius:2px;"></span>
          <span class="hamburger-line" style="display:block;width:100%;height:3px;background-color:#3a2e28;border-radius:2px;"></span>
          <span class="hamburger-line" style="display:block;width:100%;height:3px;background-color:#3a2e28;border-radius:2px;"></span>
        </button>
      </div>
    </header>

    <nav id="mobile-navigation-drawer" class="mobile-navigation-drawer" aria-label="Main navigation" hidden>
      <div class="mobile-navigation-header">
        <h2 class="mobile-navigation-title">Menu</h2>
      </div>
      <ul class="mobile-navigation-list"></ul>
    </nav>

    <main class="home-page-main-content">

      <!-- Page title -->
      <section class="dashboard-card work-section">
        <h1 class="card-title">Work</h1>
      </section>

      <!-- ETSY MAIN DROPDOWN -->
      <section class="dashboard-card work-section">
        <button class="etsy-toggle" id="etsy-main-toggle" type="button">
          <span>Etsy</span>
          <span class="etsy-chevron" id="etsy-main-chevron">▼</span>
        </button>

        <div class="etsy-body" id="etsy-main-body">

          <!-- BEADS TO PAINT -->
          <div class="beads-to-paint" style="margin-top:16px;">
            <p class="beads-to-paint-title">Beads to Paint</p>
            <div class="beads-to-paint-cols">
              <div>
                <div class="beads-col-label">CLASSIC</div>
                <ul id="beads-to-paint-classic" class="beads-to-paint ul"></ul>
              </div>
              <div>
                <div class="beads-col-label">NEON</div>
                <ul id="beads-to-paint-neon" class="beads-to-paint ul"></ul>
              </div>
            </div>
          </div>

          <!-- BEAD QUANTITY DROPDOWN -->
          <div class="inner-dropdown">
            <button class="inner-toggle" type="button" data-target="bead-qty-body">
              <span>Bead Quantity</span>
              <span class="inner-chevron">▼</span>
            </button>
            <div class="inner-body" id="bead-qty-body">

              <!-- Classic Beads -->
              <div class="sub-dropdown">
                <button class="sub-toggle" type="button" data-target="bead-classic-body">
                  <span>Etsy Classic</span>
                  <span class="sub-chevron">▼</span>
                </button>
                <div class="sub-body" id="bead-classic-body">
                  <ul class="inv-list" id="bead-classic-list"></ul>
                </div>
              </div>

              <!-- Neon Beads -->
              <div class="sub-dropdown">
                <button class="sub-toggle" type="button" data-target="bead-neon-body">
                  <span>Etsy Neon</span>
                  <span class="sub-chevron">▼</span>
                </button>
                <div class="sub-body" id="bead-neon-body">
                  <ul class="inv-list" id="bead-neon-list"></ul>
                </div>
              </div>

            </div>
          </div>

          <!-- NECKLACE QUANTITY DROPDOWN -->
          <div class="inner-dropdown">
            <button class="inner-toggle" type="button" data-target="neck-qty-body">
              <span>Necklace Quantity</span>
              <span class="inner-chevron">▼</span>
            </button>
            <div class="inner-body" id="neck-qty-body">

              <!-- Classic Necklaces -->
              <div class="sub-dropdown">
                <button class="sub-toggle" type="button" data-target="neck-classic-body">
                  <span>Etsy Classic</span>
                  <span class="sub-chevron">▼</span>
                </button>
                <div class="sub-body" id="neck-classic-body">
                  <ul class="inv-list" id="neck-classic-list"></ul>
                </div>
              </div>

              <!-- Neon Necklaces -->
              <div class="sub-dropdown">
                <button class="sub-toggle" type="button" data-target="neck-neon-body">
                  <span>Etsy Neon</span>
                  <span class="sub-chevron">▼</span>
                </button>
                <div class="sub-body" id="neck-neon-body">
                  <ul class="inv-list" id="neck-neon-list"></ul>
                </div>
              </div>

            </div>
          </div>

          <!-- INPUT DROPDOWN -->
          <div class="inner-dropdown">
            <button class="inner-toggle" type="button" data-target="input-body">
              <span>Input</span>
              <span class="inner-chevron">▼</span>
            </button>
            <div class="inner-body" id="input-body">
              <div class="etsy-input-area">
                <textarea id="etsy-input-field" class="etsy-input-field" rows="3"
                  placeholder="e.g. painted 5 Tridents&#10;sold 2 10-01 Classic&#10;bought 50 necklace strings"></textarea>
                <button type="button" class="etsy-submit-btn" id="etsy-submit-btn">Submit</button>
              </div>
            </div>
          </div>

          <!-- SUPPLIES DROPDOWN -->
          <div class="inner-dropdown">
            <button class="inner-toggle" type="button" data-target="supplies-body">
              <div class="supplies-header" style="width:100%;display:flex;align-items:center;justify-content:space-between;">
                <span>Supplies</span>
                <button type="button" class="supplies-add-btn" id="supplies-add-btn" onclick="event.stopPropagation(); openAddSupply();">＋</button>
              </div>
              <span class="inner-chevron">▼</span>
            </button>
            <div class="inner-body" id="supplies-body">
              <ul class="inv-list" id="supplies-list"></ul>
              <button type="button" class="supply-edit-btn" id="supply-edit-btn">Edit</button>
            </div>
          </div>

        </div><!-- /etsy-body -->
      </section>

    </main>
  </div>

  <!-- CLASSIC/NEON PROMPT -->
  <div class="etsy-prompt-overlay" id="line-prompt-overlay">
    <div class="etsy-prompt-box">
      <p class="etsy-prompt-title" id="line-prompt-title">Classic or Neon?</p>
      <p class="etsy-prompt-sub" id="line-prompt-sub">Which inventory line does this belong to?</p>
      <div class="etsy-prompt-btns">
        <button type="button" class="etsy-prompt-btn primary" id="line-prompt-classic">Classic</button>
        <button type="button" class="etsy-prompt-btn secondary" id="line-prompt-neon">Neon</button>
      </div>
    </div>
  </div>

  <!-- SUPPLIES EDIT OVERLAY -->
  <div class="edit-overlay" id="supply-edit-overlay">
    <div class="edit-box">
      <p class="edit-box-title">Edit Supplies</p>
      <div id="supply-edit-list"></div>
      <button type="button" class="edit-close-btn" id="supply-edit-close">Close</button>
    </div>
  </div>

  <!-- ADD SUPPLY OVERLAY -->
  <div class="etsy-prompt-overlay" id="add-supply-overlay">
    <div class="etsy-prompt-box">
      <p class="etsy-prompt-title">Add Supply</p>
      <input type="text" id="add-supply-input" placeholder="Supply name..."
        style="width:100%;padding:9px 12px;border-radius:10px;border:1.5px solid #CBB7A3;
        font-family:'Josefin Sans',sans-serif;font-size:14px;box-sizing:border-box;margin-bottom:14px;">
      <div class="etsy-prompt-btns">
        <button type="button" class="etsy-prompt-btn primary" id="add-supply-confirm">Add</button>
        <button type="button" class="etsy-prompt-btn secondary" id="add-supply-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/labels.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/dropdowns.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/tasks.js"></script>
  <script>
  /* =========================================================
     ETSY DATA
     ========================================================= */

  const BEAD_NAMES = ["Tree","Centaur","Boat","Trident","Glowing Trident","Sheep","Bow","Maze","Building","Cage","Eagle","Owl","Hel","Camp"];
  const NECKLACE_NAMES = ["10-01 Classic","10-01 Glow","10-02 Classic","10-02 Glow","10-03 Classic","10-03 Glow","10-04 Classic","10-04 Glow","10-05 Classic","10-05 Glow","20-01 Classic","20-01 Glow","20-02 Classic","20-02 Glow","30-01 Classic","30-02 Glow"];

  /* Beads shared between Classic and Neon (same count) */
  const SHARED_BEADS = ["Trident","Glowing Trident","Sheep","Maze","Owl"];

  /* Alternate names */
  const BEAD_ALIASES = { "trident glow": "Glowing Trident", "glowing trident": "Glowing Trident" };

  /* Beads used per necklace — Classic line */
  const CLASSIC_RECIPES = {
    "10-01 Classic": ["Trident","Sheep","Maze","Building"],
    "10-01 Glow":    ["Glowing Trident","Sheep","Maze","Building"],
    "10-02 Classic": ["Trident","Sheep","Bow","Maze","Building","Camp"],
    "10-02 Glow":    ["Glowing Trident","Sheep","Bow","Maze","Building","Camp"],
    "10-03 Classic": ["Trident","Sheep","Bow","Maze","Building"],
    "10-03 Glow":    ["Glowing Trident","Sheep","Bow","Maze","Building"],
    "10-04 Classic": ["Trident","Sheep","Bow","Maze","Building","Camp"],
    "10-04 Glow":    ["Glowing Trident","Sheep","Bow","Maze","Building","Camp"],
    "10-05 Classic": ["Trident","Sheep","Maze","Building","Cage","Eagle","Owl","Hel","Camp"],
    "10-05 Glow":    ["Glowing Trident","Sheep","Maze","Building","Cage","Eagle","Owl","Hel","Camp"],
    "20-01 Classic": ["Tree","Centaur","Boat","Trident","Sheep","Maze","Building"],
    "20-01 Glow":    ["Tree","Centaur","Boat","Glowing Trident","Sheep","Maze","Building"],
    "20-02 Classic": ["Tree","Centaur","Boat","Trident","Sheep","Maze","Building","Camp"],
    "20-02 Glow":    ["Tree","Centaur","Boat","Glowing Trident","Sheep","Maze","Building","Camp"],
    "30-01 Classic": ["Tree","Centaur","Boat","Trident","Sheep","Maze","Building","Cage","Eagle","Owl","Hel","Camp"],
    "30-02 Glow":    ["Tree","Centaur","Boat","Glowing Trident","Sheep","Maze","Building","Cage","Eagle","Owl","Hel","Camp"]
  };

  /* Beads used per necklace — Neon line */
  const NEON_RECIPES = {
    "10-01 Classic": ["Trident","Sheep","Maze","Building"],
    "10-01 Glow":    ["Glowing Trident","Sheep","Maze","Building"],
    "10-02 Classic": ["Trident","Sheep","Bow","Maze","Building","Camp"],
    "10-02 Glow":    ["Glowing Trident","Sheep","Bow","Maze","Building","Camp"],
    "10-03 Classic": ["Trident","Sheep","Bow","Maze","Building"],
    "10-03 Glow":    ["Glowing Trident","Sheep","Bow","Maze","Building"],
    "10-04 Classic": ["Trident","Sheep","Bow","Maze","Building","Camp"],
    "10-04 Glow":    ["Glowing Trident","Sheep","Bow","Maze","Building","Camp"],
    "10-05 Classic": ["Trident","Sheep","Bow","Maze","Building","Cage","Eagle","Owl","Hel","Camp"],
    "10-05 Glow":    ["Glowing Trident","Sheep","Bow","Maze","Building","Cage","Eagle","Owl","Hel","Camp"],
    "20-01 Classic": ["Tree","Centaur","Boat","Trident","Sheep","Bow","Maze","Building"],
    "20-01 Glow":    ["Tree","Centaur","Boat","Glowing Trident","Sheep","Bow","Maze","Building"],
    "20-02 Classic": ["Tree","Centaur","Boat","Trident","Sheep","Bow","Maze","Building","Camp"],
    "20-02 Glow":    ["Tree","Centaur","Boat","Glowing Trident","Sheep","Bow","Maze","Building","Camp"],
    "30-01 Classic": ["Tree","Centaur","Boat","Trident","Sheep","Bow","Maze","Building","Cage","Eagle","Owl","Hel","Camp"],
    "30-02 Glow":    ["Tree","Centaur","Boat","Glowing Trident","Sheep","Bow","Maze","Building","Cage","Eagle","Owl","Hel","Camp"]
  };

  const LOW_STOCK_THRESHOLD = 30;

  /* =========================================================
     STORAGE
     ========================================================= */

  function loadEtsy() {
    const raw = localStorage.getItem("lale_etsy");
    if (raw) return JSON.parse(raw);
    /* Default structure */
    const beadsClassic = {}, beadsNeon = {}, beadsShared = {};
    BEAD_NAMES.forEach(b => {
      if (SHARED_BEADS.includes(b)) beadsShared[b] = 0;
      else { beadsClassic[b] = 0; beadsNeon[b] = 0; }
    });
    const neckClassic = {}, neckNeon = {};
    NECKLACE_NAMES.forEach(n => { neckClassic[n] = 0; neckNeon[n] = 0; });
    return { beadsClassic, beadsNeon, beadsShared, neckClassic, neckNeon, supplies: {} };
  }

  function saveEtsy(data) {
    localStorage.setItem("lale_etsy", JSON.stringify(data));
  }

  /* =========================================================
     RENDER
     ========================================================= */

  function renderAll() {
    renderBeadLists();
    renderNecklaceLists();
    renderSuppliesList();
    renderBeadsToPaint();
  }

  function getBeadCount(data, bead, line) {
    if (SHARED_BEADS.includes(bead)) return data.beadsShared[bead] || 0;
    return line === "classic" ? (data.beadsClassic[bead] || 0) : (data.beadsNeon[bead] || 0);
  }

  function setBeadCount(data, bead, line, val) {
    if (SHARED_BEADS.includes(bead)) data.beadsShared[bead] = Math.max(0, val);
    else if (line === "classic") data.beadsClassic[bead] = Math.max(0, val);
    else data.beadsNeon[bead] = Math.max(0, val);
  }

  function renderBeadLists() {
    const data = loadEtsy();
    const classicList = document.getElementById("bead-classic-list");
    const neonList = document.getElementById("bead-neon-list");
    classicList.innerHTML = "";
    neonList.innerHTML = "";

    BEAD_NAMES.forEach(function(bead) {
      const cCount = getBeadCount(data, bead, "classic");
      const nCount = getBeadCount(data, bead, "neon");

      const cLi = document.createElement("li");
      cLi.innerHTML = `<span class="inv-name">${bead}</span><span class="inv-count ${cCount <= LOW_STOCK_THRESHOLD ? 'low' : ''}">${cCount}</span>`;
      classicList.appendChild(cLi);

      const nLi = document.createElement("li");
      nLi.innerHTML = `<span class="inv-name">${bead}</span><span class="inv-count ${nCount <= LOW_STOCK_THRESHOLD ? 'low' : ''}">${nCount}</span>`;
      neonList.appendChild(nLi);
    });
  }

  function renderNecklaceLists() {
    const data = loadEtsy();
    const classicList = document.getElementById("neck-classic-list");
    const neonList = document.getElementById("neck-neon-list");
    classicList.innerHTML = "";
    neonList.innerHTML = "";

    NECKLACE_NAMES.forEach(function(neck) {
      const cCount = data.neckClassic[neck] || 0;
      const nCount = data.neckNeon[neck] || 0;

      const cLi = document.createElement("li");
      cLi.innerHTML = `<span class="inv-name">${neck}</span><span class="inv-count">${cCount}</span>`;
      classicList.appendChild(cLi);

      const nLi = document.createElement("li");
      nLi.innerHTML = `<span class="inv-name">${neck}</span><span class="inv-count">${nCount}</span>`;
      neonList.appendChild(nLi);
    });
  }

  function renderSuppliesList() {
    const data = loadEtsy();
    const list = document.getElementById("supplies-list");
    list.innerHTML = "";
    const supplies = data.supplies || {};
    const keys = Object.keys(supplies);
    if (!keys.length) {
      list.innerHTML = "<li style='list-style:none;font-family:\"Josefin Sans\",sans-serif;font-size:13px;opacity:0.5;'>No supplies added yet.</li>";
      return;
    }
    keys.forEach(function(name) {
      const count = supplies[name] || 0;
      const li = document.createElement("li");
      li.innerHTML = `<span class="inv-name">${name}</span><span class="inv-count ${count <= LOW_STOCK_THRESHOLD ? 'low' : ''}">${count}</span>`;
      list.appendChild(li);
    });
  }

  function renderBeadsToPaint() {
    const data = loadEtsy();

    /* Classic: lowest 5 (shared counts as classic) */
    const classicCounts = BEAD_NAMES.map(b => ({ bead: b, count: getBeadCount(data, b, "classic") }));
    classicCounts.sort((a,b) => a.count - b.count);
    const top5Classic = classicCounts.slice(0, 5);

    /* Neon: lowest 5 */
    const neonCounts = BEAD_NAMES.map(b => ({ bead: b, count: getBeadCount(data, b, "neon") }));
    neonCounts.sort((a,b) => a.count - b.count);
    const top5Neon = neonCounts.slice(0, 5);

    const cList = document.getElementById("beads-to-paint-classic");
    const nList = document.getElementById("beads-to-paint-neon");
    cList.innerHTML = top5Classic.map(x => `<li>${x.bead} <strong>(${x.count})</strong></li>`).join("");
    nList.innerHTML = top5Neon.map(x => `<li>${x.bead} <strong>(${x.count})</strong></li>`).join("");
  }

  /* =========================================================
     DROPDOWNS
     ========================================================= */

  document.getElementById("etsy-main-toggle").addEventListener("click", function() {
    const body = document.getElementById("etsy-main-body");
    const chevron = document.getElementById("etsy-main-chevron");
    body.classList.toggle("open");
    chevron.classList.toggle("open");
  });

  document.querySelectorAll(".inner-toggle").forEach(function(btn) {
    btn.addEventListener("click", function() {
      const targetId = this.dataset.target;
      if (!targetId) return;
      const body = document.getElementById(targetId);
      const chevron = this.querySelector(".inner-chevron");
      if (!body) return;
      body.classList.toggle("open");
      if (chevron) chevron.classList.toggle("open");
    });
  });

  document.querySelectorAll(".sub-toggle").forEach(function(btn) {
    btn.addEventListener("click", function() {
      const targetId = this.dataset.target;
      if (!targetId) return;
      const body = document.getElementById(targetId);
      const chevron = this.querySelector(".sub-chevron");
      if (!body) return;
      body.classList.toggle("open");
      if (chevron) chevron.classList.toggle("open");
    });
  });

  /* =========================================================
     PROMPT HELPER
     ========================================================= */

  function askLine(title, sub) {
    return new Promise(function(resolve) {
      const overlay = document.getElementById("line-prompt-overlay");
      document.getElementById("line-prompt-title").textContent = title || "Classic or Neon?";
      document.getElementById("line-prompt-sub").textContent = sub || "Which inventory line does this belong to?";
      overlay.classList.add("open");

      function onClassic() { cleanup(); resolve("classic"); }
      function onNeon()    { cleanup(); resolve("neon"); }
      function cleanup() {
        overlay.classList.remove("open");
        document.getElementById("line-prompt-classic").removeEventListener("click", onClassic);
        document.getElementById("line-prompt-neon").removeEventListener("click", onNeon);
      }
      document.getElementById("line-prompt-classic").addEventListener("click", onClassic);
      document.getElementById("line-prompt-neon").addEventListener("click", onNeon);
    });
  }

  /* =========================================================
     LOW STOCK CHECK → Weekly Task
     ========================================================= */

  function checkLowStock(data) {
    const tasks = typeof loadTasks === "function" ? loadTasks() : [];
    const supplies = data.supplies || {};

    Object.keys(supplies).forEach(function(name) {
      if (supplies[name] <= LOW_STOCK_THRESHOLD) {
        const taskName = "Buy " + name;
        const alreadyExists = tasks.find(t => t.name === taskName && !t.completed);
        if (!alreadyExists) {
          tasks.push({
            id: "supply_" + name.replace(/\s+/g,"_") + "_" + Date.now(),
            name: taskName,
            schedule: "weekly",
            completed: false,
            streak: false,
            createdAt: new Date().toISOString()
          });
        }
      }
    });

    if (typeof saveTasks === "function") saveTasks(tasks);
  }

  /* =========================================================
     INPUT PARSER
     ========================================================= */

  function normalizeBead(str) {
    const lower = str.trim().toLowerCase();
    if (BEAD_ALIASES[lower]) return BEAD_ALIASES[lower];
    const found = BEAD_NAMES.find(b => b.toLowerCase() === lower);
    return found || null;
  }

  function normalizeNecklace(str) {
    const lower = str.trim().toLowerCase();
    const found = NECKLACE_NAMES.find(n => n.toLowerCase() === lower);
    return found || null;
  }

  function detectLine(text) {
    const lower = text.toLowerCase();
    if (lower.includes(" classic ") || lower.includes(" neon ") ||
        lower.endsWith(" classic") || lower.endsWith(" neon")) {
      if (lower.includes(" neon")) return "neon";
      if (lower.includes(" classic")) return "classic";
    }
    return null; /* ambiguous */
  }

  async function processEtsyInput(rawText) {
    const lines = rawText.split(/\n|,/).map(s => s.trim()).filter(Boolean);
    const data = loadEtsy();

    for (const line of lines) {
      const lower = line.toLowerCase();

      /* ---- PAINTED BEADS: "painted 5 Tridents" ---- */
      const paintMatch = lower.match(/painted?\s+(\d+)\s+(.+)/);
      if (paintMatch) {
        const qty = parseInt(paintMatch[1]);
        const beadRaw = paintMatch[2].replace(/s$/, ""); /* remove trailing s */
        const bead = normalizeBead(beadRaw);
        if (!bead) { alert("Couldn't find bead: " + paintMatch[2]); continue; }

        let line_type = SHARED_BEADS.includes(bead) ? "shared" : detectLine(line);
        if (!line_type || line_type === null) {
          line_type = await askLine("Classic or Neon?", `Which line are you painting "${bead}" for?`);
        }

        setBeadCount(data, bead, line_type, getBeadCount(data, bead, line_type) + qty);
        saveEtsy(data);
        renderAll();
        continue;
      }

      /* ---- SALE: "sold 2 10-01 Classic" ---- */
      const saleMatch = lower.match(/sold?\s+(\d+)\s+(.+)/);
      if (saleMatch) {
        const qty = parseInt(saleMatch[1]);
        const rest = saleMatch[2].trim();
        const useRing = /\bring\b|\bR\b/.test(line);

        /* Strip "ring" / "R" from necklace name */
        const neckRaw = rest.replace(/\s*\bring\b|\s*\bR\b/gi, "").trim();
        const neck = normalizeNecklace(neckRaw);
        if (!neck) { alert("Couldn't find necklace: " + neckRaw); continue; }

        /* Always ask Classic or Neon for sales */
        const inv = await askLine("Classic or Neon?", `Was "${neck}" sold from Classic or Neon inventory?`);
        const recipes = inv === "classic" ? CLASSIC_RECIPES : NEON_RECIPES;
        const beadsUsed = recipes[neck] || [];

        /* Subtract necklace */
        if (inv === "classic") data.neckClassic[neck] = Math.max(0, (data.neckClassic[neck] || 0) - qty);
        else data.neckNeon[neck] = Math.max(0, (data.neckNeon[neck] || 0) - qty);

        /* Subtract beads */
        beadsUsed.forEach(function(bead) {
          setBeadCount(data, bead, inv, getBeadCount(data, bead, inv) - qty);
        });

        /* Subtract supplies */
        if (data.supplies["Necklace String"] !== undefined)
          data.supplies["Necklace String"] = Math.max(0, (data.supplies["Necklace String"] || 0) - qty);
        if (data.supplies["Package"] !== undefined)
          data.supplies["Package"] = Math.max(0, (data.supplies["Package"] || 0) - qty);
        if (useRing && data.supplies["Ring"] !== undefined)
          data.supplies["Ring"] = Math.max(0, (data.supplies["Ring"] || 0) - qty);

        saveEtsy(data);
        checkLowStock(data);
        renderAll();
        continue;
      }

      /* ---- BOUGHT SUPPLIES: "bought 50 necklace strings" ---- */
      const buyMatch = lower.match(/bought?\s+(\d+)\s+(.+)/);
      if (buyMatch) {
        const qty = parseInt(buyMatch[1]);
        const supplyRaw = buyMatch[2].trim();
        /* Try to match existing supply (case-insensitive) */
        const supplyKey = Object.keys(data.supplies).find(k => k.toLowerCase() === supplyRaw) || supplyRaw;
        data.supplies[supplyKey] = (data.supplies[supplyKey] || 0) + qty;
        saveEtsy(data);
        renderAll();
        continue;
      }

      /* ---- ADD BEAD COUNT directly: "5 Trident" ---- */
      const directMatch = lower.match(/^(\d+)\s+(.+)/);
      if (directMatch) {
        const qty = parseInt(directMatch[1]);
        const beadRaw = directMatch[2].replace(/s$/, "");
        const bead = normalizeBead(beadRaw);
        if (bead) {
          let line_type = SHARED_BEADS.includes(bead) ? "shared" : detectLine(line);
          if (!line_type) {
            line_type = await askLine("Classic or Neon?", `Which line are you adding "${bead}" to?`);
          }
          setBeadCount(data, bead, line_type, getBeadCount(data, bead, line_type) + qty);
          saveEtsy(data);
          renderAll();
          continue;
        }
      }

      alert("Couldn't understand: \"" + line + "\"");
    }
  }

  document.getElementById("etsy-submit-btn").addEventListener("click", function() {
    const val = document.getElementById("etsy-input-field").value.trim();
    if (!val) return;
    processEtsyInput(val).then(function() {
      document.getElementById("etsy-input-field").value = "";
    });
  });

  document.getElementById("etsy-input-field").addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      document.getElementById("etsy-submit-btn").click();
    }
  });

  /* =========================================================
     SUPPLIES MANAGEMENT
     ========================================================= */

  function openAddSupply() {
    document.getElementById("add-supply-input").value = "";
    document.getElementById("add-supply-overlay").classList.add("open");
    setTimeout(() => document.getElementById("add-supply-input").focus(), 100);
  }

  document.getElementById("add-supply-confirm").addEventListener("click", function() {
    const name = document.getElementById("add-supply-input").value.trim();
    if (!name) return;
    const data = loadEtsy();
    if (!data.supplies[name]) data.supplies[name] = 0;
    saveEtsy(data);
    renderSuppliesList();
    document.getElementById("add-supply-overlay").classList.remove("open");
  });

  document.getElementById("add-supply-cancel").addEventListener("click", function() {
    document.getElementById("add-supply-overlay").classList.remove("open");
  });

  document.getElementById("supply-edit-btn").addEventListener("click", function() {
    const data = loadEtsy();
    const list = document.getElementById("supply-edit-list");
    list.innerHTML = "";
    const keys = Object.keys(data.supplies || {});
    if (!keys.length) {
      list.innerHTML = "<p style='font-size:13px;opacity:0.5;font-family:\"Josefin Sans\",sans-serif;'>No supplies to edit.</p>";
    } else {
      keys.forEach(function(name) {
        const row = document.createElement("div");
        row.className = "edit-item-row";
        row.innerHTML = `
          <span class="edit-item-name">${name} <span style="opacity:0.5;">(${data.supplies[name]})</span></span>
          <button class="edit-remove-btn" data-name="${name}">✕</button>
        `;
        row.querySelector(".edit-remove-btn").addEventListener("click", function() {
          const d = loadEtsy();
          delete d.supplies[this.dataset.name];
          saveEtsy(d);
          renderSuppliesList();
          row.remove();
        });
        list.appendChild(row);
      });
    }
    document.getElementById("supply-edit-overlay").classList.add("open");
  });

  document.getElementById("supply-edit-close").addEventListener("click", function() {
    document.getElementById("supply-edit-overlay").classList.remove("open");
  });

  /* =========================================================
     INIT
     ========================================================= */

  document.addEventListener("DOMContentLoaded", function() {
    renderAll();
  });

  </script>
</body>
