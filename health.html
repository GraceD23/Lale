<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /> <!-- Defines the character set so text/symbols display correctly -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" /> <!-- Makes the page scale correctly on iPhone/mobile -->

  <title>Health</title> <!-- Browser tab title for the Health page -->

  <!-- Base stylesheet:
       Holds resets, base font settings, and shared defaults. -->
  <link rel="stylesheet" href="css/style.css" />

  <!-- Theme stylesheet:
       Holds easy-to-change colors, shadows, borders, and visual design. -->
  <link rel="stylesheet" href="css/theme.css" />

  <!-- Layout stylesheet:
       Controls spacing, widths, and page placement. -->
  <link rel="stylesheet" href="css/layout.css" />

  <!-- Components stylesheet:
       Controls reusable UI pieces like cards, buttons, and menu styling. -->
  <link rel="stylesheet" href="css/components.css" />
</head>

<body>
  <!-- =========================================================
       APP SHELL
       Main wrapper for the full Health page.
       ========================================================= -->
  <div id="app-shell" class="app-shell">

    <!-- =======================================================
         TOP BAR
         Contains the top-right hamburger menu button.
         ======================================================= -->
    <header class="top-bar">
      <div class="top-bar-left">
        <!-- Left area intentionally left open for future title/greeting space -->
      </div>

      <div class="top-bar-right">
        <button
          id="hamburger-menu-button"
          class="hamburger-menu-button"
          type="button"
          aria-label="Open navigation menu"
          aria-expanded="false"
          aria-controls="mobile-navigation-drawer"
        >
          <span class="hamburger-line" style="display:block;width:100%;height:3px;background-color:#3a2e28;border-radius:2px;"></span> <!-- Top hamburger line -->
          <span class="hamburger-line" style="display:block;width:100%;height:3px;background-color:#3a2e28;border-radius:2px;"></span> <!-- Middle hamburger line -->
          <span class="hamburger-line" style="display:block;width:100%;height:3px;background-color:#3a2e28;border-radius:2px;"></span> <!-- Bottom hamburger line -->
        </button>
      </div>
    </header>

    <!-- =======================================================
         MOBILE NAVIGATION DRAWER
         Hidden menu panel opened by the hamburger button.
         ======================================================= -->
    <nav
      id="mobile-navigation-drawer"
      class="mobile-navigation-drawer"
      aria-label="Main navigation"
      hidden
    >
      <div class="mobile-navigation-header">
        <h2 class="mobile-navigation-title">Menu</h2> <!-- Menu title shown inside drawer -->
      </div>

      <ul class="mobile-navigation-list">
        <li><a href="index.html">Home</a></li>
        <li><a href="streaks.html">Streaks</a></li>
        <li><a href="health.html">Health</a></li>
        <li><a href="history.html">History</a></li>
        <li><a href="notes.html">Notes</a></li>
        <li><a href="add.html">Add</a></li>
        <li><a href="spelling.html">Spelling Quiz</a></li>
        <li><a href="turkish.html">Turkish Stories</a></li>
        <li><a href="conversation.html">Turkish Chat</a></li>
      </ul>
    </nav>

    <!-- =======================================================
         MAIN PAGE CONTENT
         Holds the Health page sections in vertical order.
         ======================================================= -->
    <main class="home-page-main-content">

      <!-- =====================================================
           PAGE TITLE CARD
           Simple page header so the Health page has a clear title.
           ===================================================== -->
      <section class="dashboard-card">
        <h1 class="card-title">Health</h1> <!-- Main Health page title -->
      </section>

      <!-- =====================================================
           HEADACHES SECTION
           This follows your health-category pattern:
           - weekly Mon-Sun row at top
           - filled day box indicates at least one entry that day
           - tap day later to see entry details
           - month dropdown under the weekly row

           For now this is starter structure only.
           ===================================================== -->
      <section class="dashboard-card health-category-card" aria-labelledby="headaches-title">
        <h2 id="headaches-title" class="card-title">Headaches</h2> <!-- Title for headache tracking section -->

        <!-- Weekly row label -->
        <div class="health-week-labels">
          <span>Mon</span> <!-- Monday label -->
          <span>Tue</span> <!-- Tuesday label -->
          <span>Wed</span> <!-- Wednesday label -->
          <span>Thu</span> <!-- Thursday label -->
          <span>Fri</span> <!-- Friday label -->
          <span>Sat</span> <!-- Saturday label -->
          <span>Sun</span> <!-- Sunday label -->
        </div>

        <!-- Weekly headache boxes:
             Filled starter boxes represent days with at least one headache entry. -->
        <div class="health-week-grid">
          <button type="button" class="health-day-box">■</button> <!-- Example filled Monday headache box -->
          <button type="button" class="health-day-box">□</button> <!-- Example empty Tuesday box -->
          <button type="button" class="health-day-box">□</button> <!-- Example empty Wednesday box -->
          <button type="button" class="health-day-box">■</button> <!-- Example filled Thursday headache box -->
          <button type="button" class="health-day-box">□</button> <!-- Example empty Friday box -->
          <button type="button" class="health-day-box">□</button> <!-- Example empty Saturday box -->
          <button type="button" class="health-day-box">□</button> <!-- Example empty Sunday box -->
        </div>

        <!-- Month dropdown:
             Will later switch the monthly view only, not the weekly row. -->
        <button
          type="button"
          class="dropdown-toggle-button"
          aria-expanded="false"
          aria-controls="headaches-month-content"
        >
          <span class="dropdown-title">Month: Current Month</span> <!-- Month selector title -->
          <span class="dropdown-arrow" aria-hidden="true">⌄</span> <!-- Arrow showing dropdown can open/close -->
        </button>

        <!-- Dropdown content showing starter monthly summary text -->
        <div id="headaches-month-content" class="dropdown-content" hidden>
          <p>Monthly headache details will appear here.</p> <!-- Starter placeholder for monthly headache view -->
        </div>
      </section>

          </main>
  </div>

  <!-- =========================================================
       JAVASCRIPT FILES
       These are loaded at the bottom so the page structure loads first.
       ========================================================= -->
  <script src="js/auth.js"></script>
  <script src="js/labels.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/dropdowns.js"></script>
  <script src="js/review-panel.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/health-system.js"></script>
  <script src="js/health.js"></script>
  <link rel="stylesheet" href="css/components-additions.css" />
</body>
</html>
