<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Health</title>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/components-additions.css" />
  <style>
    :root { --font:'Josefin Sans',sans-serif; --title-color:#3C2F26; --text-main:#4E4036; --border-soft:#CBB7A3; --button-primary:#B88C6A; --card-radius:18px; }
    .tracker-card { background:#FFFAF5; border-radius:var(--card-radius); border:1px solid var(--border-soft); box-shadow:0 4px 10px rgba(0,0,0,0.07); margin-bottom:14px; overflow:hidden; }
    .tracker-header { display:flex; align-items:center; justify-content:space-between; padding:16px 18px 14px; cursor:pointer; }
    .tracker-title { font-family:var(--font); font-size:17px; font-weight:600; margin:0; }
    .tracker-chevron { font-size:13px; color:var(--border-soft); transition:transform 0.25s; background:none; border:none; padding:4px 8px; cursor:pointer; }
    .tracker-chevron.open { transform:rotate(180deg); }
    .tracker-body { display:none; padding:0 16px 16px; }
    .tracker-body.open { display:block; }
    .health-cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-top:6px; }
    .cal-label { text-align:center; font-family:var(--font); font-size:10px; opacity:0.5; padding-bottom:2px; }
    .cal-day { aspect-ratio:1; border-radius:50%; border:1.5px solid var(--border-soft); background:transparent; font-family:var(--font); font-size:10px; cursor:pointer; display:flex; align-items:center; justify-content:center; padding:0; width:100%; color:var(--text-main); }
    .cal-day.filled { color:white; }
    .cal-day.today-ring { box-shadow:0 0 0 2px rgba(184,140,106,0.4); }
    .month-nav { display:flex; align-items:center; gap:6px; margin-bottom:10px; }
    .month-nav button { background:none; border:none; font-size:20px; cursor:pointer; color:var(--button-primary); padding:2px 8px; line-height:1; }
    .month-nav span { flex:1; text-align:center; font-family:var(--font); font-size:13px; font-weight:600; color:var(--title-color); }
    .entry-form { display:none; margin-top:10px; padding:12px; background:rgba(255,255,255,0.6); border-radius:10px; border:1px solid var(--border-soft); }
    .entry-form.open { display:block; }
    .entry-form p { margin:0 0 8px; font-family:var(--font); font-size:13px; font-weight:600; color:var(--title-color); }
    .entry-input { width:100%; padding:7px 10px; border-radius:8px; border:1px solid var(--border-soft); font-family:var(--font); font-size:13px; color:var(--text-main); background:white; box-sizing:border-box; margin-bottom:8px; }
    .entry-input:focus { outline:none; border-color:var(--button-primary); }
    .entry-btns { display:flex; gap:8px; }
    .btn-save { padding:7px 18px; border-radius:10px; border:none; background:var(--button-primary); color:white; font-family:var(--font); font-size:13px; font-weight:600; cursor:pointer; }
    .btn-cancel { padding:7px 14px; border-radius:10px; border:1.5px solid var(--border-soft); background:white; color:var(--text-main); font-family:var(--font); font-size:13px; cursor:pointer; }
    .btn-delete { padding:7px 14px; border-radius:10px; border:1.5px solid #c0392b; background:white; color:#c0392b; font-family:var(--font); font-size:13px; cursor:pointer; margin-left:auto; }
    .scale-btns { display:flex; gap:8px; margin-bottom:10px; }
    .scale-btn { width:40px; height:40px; border-radius:50%; border:1.5px solid; background:transparent; font-family:var(--font); font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .weight-add-btn { padding:7px 14px; border-radius:10px; border:1.5px solid var(--border-soft); background:white; font-family:var(--font); font-size:13px; color:var(--text-main); cursor:pointer; margin-bottom:10px; }
    .weight-log-entry { font-family:var(--font); font-size:13px; color:var(--text-main); padding:4px 0; border-bottom:1px solid #f0e6da; display:flex; align-items:center; justify-content:space-between; }
    .weight-log-entry:last-child { border-bottom:none; }
    .comparison-checklist { display:flex; flex-wrap:wrap; gap:8px; margin:10px 0 14px; }
    .comp-check-label { display:flex; align-items:center; gap:6px; cursor:pointer; font-family:var(--font); font-size:13px; padding:5px 12px; border-radius:20px; border:1.5px solid; background:white; user-select:none; transition:background 0.15s; }
    .comp-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; display:inline-block; }
    .comp-day-detail { margin-top:12px; padding:12px; background:rgba(255,255,255,0.6); border-radius:12px; border:1px solid var(--border-soft); font-family:var(--font); }
    .edit-trackers-btn { width:100%; padding:12px; border-radius:var(--card-radius); border:1.5px solid var(--border-soft); background:white; font-family:var(--font); font-size:14px; color:var(--text-main); cursor:pointer; margin-bottom:24px; }
    .edit-panel-overlay { position:fixed; inset:0; background:rgba(60,47,38,0.4); z-index:3000; display:none; align-items:flex-end; justify-content:center; }
    .edit-panel-overlay.open { display:flex; }
    .edit-panel-box { background:#F7F1E8; border-radius:20px 20px 0 0; width:100%; max-width:480px; max-height:70vh; overflow-y:auto; padding:24px 20px 40px; box-sizing:border-box; }
    .edit-panel-title { font-family:var(--font); font-size:16px; font-weight:600; color:var(--title-color); margin:0 0 16px; }
    .edit-tracker-row { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
    .edit-tracker-input { flex:1; padding:8px 10px; border-radius:8px; border:1px solid var(--border-soft); font-family:var(--font); font-size:14px; color:var(--text-main); }
    .edit-save-btn { padding:7px 12px; border-radius:8px; border:none; background:var(--button-primary); color:white; font-family:var(--font); font-size:13px; cursor:pointer; }
    .edit-delete-btn { padding:7px 10px; border-radius:8px; border:1.5px solid #c0392b; background:white; color:#c0392b; font-size:13px; cursor:pointer; }
    .edit-done-btn { width:100%; margin-top:14px; padding:11px; border-radius:12px; border:1.5px solid var(--border-soft); background:none; font-family:var(--font); font-size:14px; color:var(--text-main); cursor:pointer; }
    .add-tracker-row { display:flex; gap:8px; margin-bottom:14px; }
    .add-tracker-input { flex:1; padding:8px 10px; border-radius:8px; border:1px solid var(--border-soft); font-family:var(--font); font-size:14px; }
    .add-tracker-btn { padding:8px 14px; border-radius:8px; border:none; background:var(--button-primary); color:white; font-family:var(--font); font-size:13px; cursor:pointer; }
  </style>
</head>
<body>
<div id="global-overlay" class="global-overlay" hidden></div>
<div id="app-shell" class="app-shell">
  <header class="top-bar">
    <div class="top-bar-left"></div>
    <div class="top-bar-right">
      <button id="hamburger-menu-button" class="hamburger-menu-button" type="button" aria-label="Open navigation menu" aria-expanded="false" aria-controls="mobile-navigation-drawer">
        <span class="hamburger-line" style="display:block;width:100%;height:3px;background-color:#3a2e28;border-radius:2px;"></span>
        <span class="hamburger-line" style="display:block;width:100%;height:3px;background-color:#3a2e28;border-radius:2px;"></span>
        <span class="hamburger-line" style="display:block;width:100%;height:3px;background-color:#3a2e28;border-radius:2px;"></span>
      </button>
    </div>
  </header>
  <nav id="mobile-navigation-drawer" class="mobile-navigation-drawer" aria-label="Main navigation" hidden>
    <div class="mobile-navigation-header"><h2 class="mobile-navigation-title">Menu</h2></div>
    <ul class="mobile-navigation-list"></ul>
  </nav>
  <main class="home-page-main-content" id="health-main">
    <section class="dashboard-card" style="margin-bottom:14px;"><h1 class="card-title">Health</h1></section>
    <div id="trackers-container"></div>
    <button class="edit-trackers-btn" id="edit-trackers-btn" type="button">Edit Trackers</button>
    <!-- Comparison always at bottom -->
    <div class="tracker-card" id="comparison-card" style="margin-bottom:24px;">
      <div class="tracker-header" id="comparison-header">
        <h2 class="tracker-title" style="color:#3C2F26;">Comparison</h2>
        <button class="tracker-chevron" id="comparison-chevron" type="button">▼</button>
      </div>
      <div class="tracker-body" id="comparison-body">
        <div class="comparison-checklist" id="comp-checklist"></div>
        <div class="month-nav">
          <button type="button" id="comp-prev">‹</button>
          <span id="comp-month-label"></span>
          <button type="button" id="comp-next">›</button>
        </div>
        <div class="health-cal-grid" id="comp-grid"></div>
        <div id="comp-detail-wrap"></div>
      </div>
    </div>
  </main>
</div>

<!-- Edit Panel -->
<div class="edit-panel-overlay" id="edit-panel-overlay">
  <div class="edit-panel-box">
    <p class="edit-panel-title">Edit Trackers</p>
    <div class="add-tracker-row">
      <input type="text" class="add-tracker-input" id="new-tracker-name" placeholder="New tracker name...">
      <button class="add-tracker-btn" type="button" id="add-tracker-btn">Add</button>
    </div>
    <div id="edit-tracker-list"></div>
    <button class="edit-done-btn" type="button" id="edit-done-btn">Done</button>
  </div>
</div>

<script src="js/auth.js"></script>
<script src="js/labels.js"></script>
<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script src="js/menu.js"></script>
<script src="js/storage.js"></script>
<script>
/* ── Health Page — fully self-contained ── */

const TRACKER_COLORS = { headaches:"#b0977a", weight:"#8fa98f", energy:"#a09fc0", moon:"#7a9cbf", annoyance:"#b07a9c" };
function getColor(t) { return TRACKER_COLORS[t.id] || t.color || "#b0977a"; }

function getDefaultTrackers() {
  return [
    { id:"headaches", name:"Headaches",   type:"calendar", color:"#b0977a" },
    { id:"weight",    name:"Weight",       type:"weight",   color:"#8fa98f" },
    { id:"energy",    name:"Energy Level", type:"scale",    color:"#a09fc0" },
    { id:"moon",      name:"Moon",         type:"calendar", color:"#7a9cbf" },
    { id:"annoyance", name:"Annoyance",    type:"calendar", color:"#b07a9c" }
  ];
}

function getTrackers() {
  try {
    if (typeof loadHealthTrackers==="function") { const t=loadHealthTrackers(); if(t&&t.length) return t; }
    const raw=localStorage.getItem("lale_health_trackers");
    if(raw){ const p=JSON.parse(raw); if(p&&p.length) return p; }
  } catch(e){}
  return getDefaultTrackers();
}
function saveTrackers(t) {
  if(typeof saveHealthTrackers==="function") saveHealthTrackers(t);
  else localStorage.setItem("lale_health_trackers",JSON.stringify(t));
}
function getHealth() {
  if(typeof loadHealth==="function") return loadHealth()||{};
  try { return JSON.parse(localStorage.getItem("lale_health")||"{}"); } catch(e){ return {}; }
}
function putHealth(d) {
  if(typeof saveHealth==="function") saveHealth(d);
  else localStorage.setItem("lale_health",JSON.stringify(d));
}

function pad(n){ return String(n).padStart(2,"0"); }
function todayKey(){ const d=new Date(); return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function curMonth(){ const d=new Date(); return d.getFullYear()+"-"+pad(d.getMonth()+1); }
function shiftMonth(mk,dir){ const[y,m]=mk.split("-").map(Number); const d=new Date(y,m-1+dir,1); return d.getFullYear()+"-"+pad(d.getMonth()+1); }
function monthLabel(mk){ const[y,m]=mk.split("-").map(Number); return new Date(y,m-1,1).toLocaleString("default",{month:"long",year:"numeric"}); }
function escH(s){ const d=document.createElement("div"); d.textContent=String(s||""); return d.innerHTML; }

function buildPage() {
  const container=document.getElementById("trackers-container");
  container.innerHTML="";
  getTrackers().forEach(function(t){ const c=buildCard(t); if(c) container.appendChild(c); });
  buildCompChecklist();
  renderCompCalendar();
}

function toggleCard(id) {
  const b=document.getElementById("body-"+id);
  const c=document.querySelector("#hdr-"+id+" .tracker-chevron");
  if(b){ b.classList.toggle("open"); }
  if(c){ c.classList.toggle("open"); }
}

/* ── Calendar Card ── */
function buildCard(tracker) {
  if(tracker.type==="weight") return buildWeightCard(tracker);
  if(tracker.type==="scale")  return buildScaleCard(tracker);
  return buildCalCard(tracker);
}

function buildCalCard(tracker) {
  const color=getColor(tracker);
  const mk=curMonth();
  const card=document.createElement("div");
  card.className="tracker-card"; card.id="card-"+tracker.id; card.dataset.month=mk;
  card.innerHTML=
    '<div class="tracker-header" id="hdr-'+tracker.id+'">'+
      '<h2 class="tracker-title" style="color:'+color+';">'+escH(tracker.name)+'</h2>'+
      '<button class="tracker-chevron" type="button" aria-label="Toggle">▼</button>'+
    '</div>'+
    '<div class="tracker-body" id="body-'+tracker.id+'">'+
      '<div class="month-nav">'+
        '<button type="button" data-dir="-1" data-t="'+tracker.id+'">‹</button>'+
        '<span id="mlbl-'+tracker.id+'">'+monthLabel(mk)+'</span>'+
        '<button type="button" data-dir="1" data-t="'+tracker.id+'">›</button>'+
      '</div>'+
      '<div class="health-cal-grid" id="cal-'+tracker.id+'"></div>'+
      '<div class="entry-form" id="form-'+tracker.id+'">'+
        '<p id="ftitle-'+tracker.id+'"></p>'+
        '<input type="number" min="1" max="5" class="entry-input" id="sev-'+tracker.id+'" placeholder="Severity 1-5 (optional)">'+
        '<input type="text" class="entry-input" id="note-'+tracker.id+'" placeholder="Note (optional)">'+
        '<div class="entry-btns">'+
          '<button class="btn-save" type="button" data-t="'+tracker.id+'" data-a="save">Save</button>'+
          '<button class="btn-cancel" type="button" data-t="'+tracker.id+'" data-a="cancel">Cancel</button>'+
          '<button class="btn-delete" type="button" data-t="'+tracker.id+'" data-a="delete" style="display:none;">Delete</button>'+
        '</div>'+
      '</div>'+
    '</div>';

  card.querySelector("#hdr-"+tracker.id).addEventListener("click",function(e){
    if(e.target.tagName==="BUTTON"&&e.target.getAttribute("aria-label")==="Toggle"){ toggleCard(tracker.id); return; }
    if(e.target.tagName==="BUTTON"&&e.target.dataset.dir) return;
    toggleCard(tracker.id);
  });
  card.querySelector(".tracker-chevron").addEventListener("click",function(e){ e.stopPropagation(); toggleCard(tracker.id); });
  card.querySelectorAll("[data-dir]").forEach(function(btn){
    btn.addEventListener("click",function(e){ e.stopPropagation();
      card.dataset.month=shiftMonth(card.dataset.month,parseInt(btn.dataset.dir));
      document.getElementById("mlbl-"+tracker.id).textContent=monthLabel(card.dataset.month);
      renderCal(tracker,card.dataset.month,color);
    });
  });
  card.querySelector("[data-a='save']").addEventListener("click",function(){ saveEntry(tracker,card); });
  card.querySelector("[data-a='cancel']").addEventListener("click",function(){ closeForm(tracker.id,card); });
  card.querySelector("[data-a='delete']").addEventListener("click",function(){ deleteEntry(tracker,card); });
  renderCal(tracker,mk,color);
  return card;
}

function renderCal(tracker,mk,color) {
  const grid=document.getElementById("cal-"+tracker.id);
  if(!grid) return;
  const health=getHealth();
  const entries=(health[mk]&&health[mk][tracker.id])||[];
  const filled=new Set(entries.map(function(e){return e.day;}));
  const[year,month]=mk.split("-").map(Number);
  const days=new Date(year,month,0).getDate();
  const offset=(new Date(year,month-1,1).getDay()+6)%7;
  grid.innerHTML="";
  ["M","T","W","T","F","S","S"].forEach(function(d){ const l=document.createElement("div"); l.className="cal-label"; l.textContent=d; grid.appendChild(l); });
  for(let i=0;i<offset;i++) grid.appendChild(document.createElement("div"));
  for(let day=1;day<=days;day++){
    const dk=mk+"-"+pad(day);
    const dayEntries=entries.filter(function(e){return e.day===dk;});
    const isFilled=dayEntries.length>0;
    const isToday=dk===todayKey();
    const btn=document.createElement("button");
    btn.type="button";
    btn.className="cal-day"+(isFilled?" filled":"")+(isToday?" today-ring":"");
    btn.style.borderColor=color;
    if(isFilled) btn.style.background=color;
    btn.textContent=isFilled?"✓":String(day);
    btn.addEventListener("click",function(){ openForm(tracker,dk,day,dayEntries,color); });
    grid.appendChild(btn);
  }
}

function openForm(tracker,dateKey,day,existing,color){
  const card=document.getElementById("card-"+tracker.id);
  const form=document.getElementById("form-"+tracker.id);
  const titleEl=document.getElementById("ftitle-"+tracker.id);
  const delBtn=form.querySelector("[data-a='delete']");
  if(!form) return;
  card.dataset.selectedDay=dateKey;
  let exHtml="";
  existing.forEach(function(e){
    const t=new Date(e.date);
    const ts=t.toLocaleTimeString("default",{hour:"2-digit",minute:"2-digit"});
    exHtml+="<br><small style='font-weight:normal;opacity:0.7;'>"+ts+(e.severity?" · sev "+e.severity:"")+(e.note?" · "+escH(e.note):"")+"</small>";
  });
  titleEl.innerHTML=existing.length?"Day "+day+" ("+existing.length+" entr"+(existing.length>1?"ies":"y")+")"+exHtml+"<br>Add another:":"Add entry for Day "+day;
  document.getElementById("sev-"+tracker.id).value="";
  document.getElementById("note-"+tracker.id).value="";
  if(delBtn) delBtn.style.display=existing.length===1?"":"none";
  form.classList.add("open");
}

function closeForm(id,card){
  const f=document.getElementById("form-"+id);
  if(f) f.classList.remove("open");
  if(card) card.dataset.selectedDay="";
}

function saveEntry(tracker,card){
  const dk=card.dataset.selectedDay; if(!dk) return;
  const mk=card.dataset.month;
  const health=getHealth();
  if(!health[mk]) health[mk]={};
  if(!health[mk][tracker.id]) health[mk][tracker.id]=[];
  health[mk][tracker.id].push({day:dk,date:new Date().toISOString(),severity:document.getElementById("sev-"+tracker.id).value,note:document.getElementById("note-"+tracker.id).value.trim()});
  putHealth(health);
  closeForm(tracker.id,card);
  renderCal(tracker,mk,getColor(tracker));
  renderCompCalendar();
}

function deleteEntry(tracker,card){
  const dk=card.dataset.selectedDay; if(!dk) return;
  const mk=card.dataset.month;
  const health=getHealth();
  if(health[mk]&&health[mk][tracker.id]) health[mk][tracker.id]=health[mk][tracker.id].filter(function(e){return e.day!==dk;});
  putHealth(health);
  closeForm(tracker.id,card);
  renderCal(tracker,mk,getColor(tracker));
  renderCompCalendar();
}

/* ── Weight Card ── */
function buildWeightCard(tracker){
  const color=getColor(tracker);
  const mk=curMonth();
  const card=document.createElement("div");
  card.className="tracker-card"; card.id="card-"+tracker.id; card.dataset.month=mk;
  card.innerHTML=
    '<div class="tracker-header" id="hdr-'+tracker.id+'">'+
      '<h2 class="tracker-title" style="color:'+color+';">'+escH(tracker.name)+'</h2>'+
      '<button class="tracker-chevron" type="button" aria-label="Toggle">▼</button>'+
    '</div>'+
    '<div class="tracker-body" id="body-'+tracker.id+'">'+
      '<div class="month-nav">'+
        '<button type="button" data-dir="-1">‹</button>'+
        '<span id="mlbl-'+tracker.id+'">'+monthLabel(mk)+'</span>'+
        '<button type="button" data-dir="1">›</button>'+
      '</div>'+
      '<button class="weight-add-btn" type="button" id="wadd-'+tracker.id+'">＋ Add Entry</button>'+
      '<div class="entry-form" id="wform-'+tracker.id+'">'+
        '<p>Log weight:</p>'+
        '<input type="text" class="entry-input" id="winput-'+tracker.id+'" placeholder="e.g. 120lb 3oz or 54.4kg">'+
        '<div class="entry-btns">'+
          '<button class="btn-save" type="button" id="wsave-'+tracker.id+'">Save</button>'+
          '<button class="btn-cancel" type="button" id="wcancel-'+tracker.id+'">Cancel</button>'+
        '</div>'+
      '</div>'+
      '<div id="wlog-'+tracker.id+'"></div>'+
    '</div>';

  card.querySelector("#hdr-"+tracker.id).addEventListener("click",function(e){ if(e.target.tagName==="BUTTON") return; toggleCard(tracker.id); });
  card.querySelector(".tracker-chevron").addEventListener("click",function(e){ e.stopPropagation(); toggleCard(tracker.id); });
  card.querySelectorAll("[data-dir]").forEach(function(btn){
    btn.addEventListener("click",function(e){ e.stopPropagation();
      card.dataset.month=shiftMonth(card.dataset.month,parseInt(btn.dataset.dir));
      document.getElementById("mlbl-"+tracker.id).textContent=monthLabel(card.dataset.month);
      renderWLog(tracker,card.dataset.month);
    });
  });
  card.querySelector("#wadd-"+tracker.id).addEventListener("click",function(){
    document.getElementById("wform-"+tracker.id).classList.add("open");
    this.style.display="none";
  });
  card.querySelector("#wcancel-"+tracker.id).addEventListener("click",function(){
    document.getElementById("wform-"+tracker.id).classList.remove("open");
    document.getElementById("wadd-"+tracker.id).style.display="";
  });
  card.querySelector("#wsave-"+tracker.id).addEventListener("click",function(){
    const val=document.getElementById("winput-"+tracker.id).value.trim(); if(!val) return;
    const health=getHealth(); const cmk=card.dataset.month;
    if(!health[cmk]) health[cmk]={};
    if(!health[cmk][tracker.id]) health[cmk][tracker.id]=[];
    health[cmk][tracker.id].push({date:new Date().toISOString(),value:val,day:todayKey()});
    putHealth(health);
    document.getElementById("winput-"+tracker.id).value="";
    document.getElementById("wform-"+tracker.id).classList.remove("open");
    document.getElementById("wadd-"+tracker.id).style.display="";
    renderWLog(tracker,card.dataset.month);
  });
  renderWLog(tracker,mk);
  return card;
}

function renderWLog(tracker,mk){
  const log=document.getElementById("wlog-"+tracker.id); if(!log) return;
  const health=getHealth();
  const entries=(health[mk]&&health[mk][tracker.id])||[];
  if(!entries.length){ log.innerHTML=""; return; }
  log.innerHTML=entries.slice().reverse().map(function(e){
    const d=new Date(e.date);
    const ds=d.toLocaleDateString("default",{month:"short",day:"numeric"});
    const ts=d.toLocaleTimeString("default",{hour:"2-digit",minute:"2-digit"});
    return '<div class="weight-log-entry"><span>'+ds+" "+ts+" — "+escH(e.value||e.note||"")+'</span>'+
      '<button type="button" onclick="deleteWeight(\''+tracker.id+'\',\''+e.date+'\',\''+mk+'\')" style="background:none;border:none;color:#c0392b;font-size:12px;cursor:pointer;">✕</button></div>';
  }).join("");
}

function deleteWeight(id,isoDate,mk){
  const health=getHealth();
  if(health[mk]&&health[mk][id]) health[mk][id]=health[mk][id].filter(function(e){return e.date!==isoDate;});
  putHealth(health);
  const t=getTrackers().find(function(x){return x.id===id;});
  if(t) renderWLog(t,mk);
}

/* ── Scale Card (Energy) ── */
function buildScaleCard(tracker){
  const color=getColor(tracker);
  const card=document.createElement("div");
  card.className="tracker-card"; card.id="card-"+tracker.id;
  card.innerHTML=
    '<div class="tracker-header" id="hdr-'+tracker.id+'">'+
      '<h2 class="tracker-title" style="color:'+color+';">'+escH(tracker.name)+'</h2>'+
      '<button class="tracker-chevron" type="button" aria-label="Toggle">▼</button>'+
    '</div>'+
    '<div class="tracker-body" id="body-'+tracker.id+'">'+
      '<p style="font-family:var(--font);font-size:13px;margin:0 0 8px;">Today\'s level:</p>'+
      '<div class="scale-btns">'+
        [1,2,3,4,5].map(function(n){return '<button class="scale-btn" type="button" data-level="'+n+'" style="border-color:'+color+';color:'+color+';">'+n+'</button>';}).join("")+
      '</div>'+
      '<div id="slog-'+tracker.id+'" style="font-family:var(--font);font-size:12px;"></div>'+
    '</div>';

  card.querySelector("#hdr-"+tracker.id).addEventListener("click",function(e){ if(e.target.tagName==="BUTTON") return; toggleCard(tracker.id); });
  card.querySelector(".tracker-chevron").addEventListener("click",function(e){ e.stopPropagation(); toggleCard(tracker.id); });
  card.querySelectorAll(".scale-btn").forEach(function(btn){
    btn.addEventListener("click",function(){
      const level=btn.dataset.level;
      const health=getHealth(); const mk=curMonth();
      if(!health[mk]) health[mk]={};
      if(!health[mk][tracker.id]) health[mk][tracker.id]=[];
      health[mk][tracker.id].push({date:new Date().toISOString(),level:level,day:todayKey()});
      putHealth(health);
      card.querySelectorAll(".scale-btn").forEach(function(b){
        const sel=b.dataset.level===level;
        b.style.background=sel?color:"transparent";
        b.style.color=sel?"white":color;
      });
      renderSLog(tracker);
    });
  });
  renderSLog(tracker);
  return card;
}

function renderSLog(tracker){
  const log=document.getElementById("slog-"+tracker.id); if(!log) return;
  const health=getHealth(); const mk=curMonth();
  const entries=(health[mk]&&health[mk][tracker.id])||[];
  log.innerHTML=entries.slice(-5).reverse().map(function(e){
    const d=new Date(e.date);
    return '<p style="margin:2px 0;">'+d.toLocaleDateString("default",{month:"short",day:"numeric"})+': Level '+e.level+'</p>';
  }).join("")||'<p style="opacity:0.5;margin:4px 0;">No entries yet.</p>';
}

/* ── Comparison ── */
var compMonth=curMonth();

function buildCompChecklist(){
  const container=document.getElementById("comp-checklist"); if(!container) return;
  container.innerHTML="";
  const trackers=getTrackers().filter(function(t){return t.type==="calendar"||t.type==="scale";});
  trackers.forEach(function(tracker){
    const color=TRACKER_COLORS[tracker.id]||getColor(tracker);
    const label=document.createElement("label"); label.className="comp-check-label"; label.style.borderColor=color;
    const dot=document.createElement("span"); dot.className="comp-dot"; dot.style.background=color;
    const cb=document.createElement("input"); cb.type="checkbox"; cb.dataset.trackerId=tracker.id; cb.checked=true; cb.style.display="none";
    label.appendChild(dot); label.appendChild(cb); label.appendChild(document.createTextNode(" "+tracker.name));
    function upd(){ label.style.background=cb.checked?color+"22":"white"; label.style.fontWeight=cb.checked?"600":"400"; }
    upd();
    label.addEventListener("click",function(e){ e.preventDefault(); cb.checked=!cb.checked; upd(); renderCompCalendar(); });
    container.appendChild(label);
  });
  document.getElementById("comp-month-label").textContent=monthLabel(compMonth);
  document.getElementById("comp-prev").addEventListener("click",function(){ compMonth=shiftMonth(compMonth,-1); document.getElementById("comp-month-label").textContent=monthLabel(compMonth); renderCompCalendar(); });
  document.getElementById("comp-next").addEventListener("click",function(){ compMonth=shiftMonth(compMonth,1); document.getElementById("comp-month-label").textContent=monthLabel(compMonth); renderCompCalendar(); });
  document.getElementById("comparison-header").addEventListener("click",function(e){ if(e.target.id==="comparison-chevron") return; toggleComp(); });
  document.getElementById("comparison-chevron").addEventListener("click",function(e){ e.stopPropagation(); toggleComp(); });
}

function toggleComp(){
  document.getElementById("comparison-body").classList.toggle("open");
  document.getElementById("comparison-chevron").classList.toggle("open");
}

function getSelectedIds(){
  const ids=[];
  document.querySelectorAll("#comp-checklist input[type=checkbox]").forEach(function(cb){ if(cb.checked) ids.push(cb.dataset.trackerId); });
  return ids;
}

function renderCompCalendar(){
  const grid=document.getElementById("comp-grid"); if(!grid) return;
  const selected=getSelectedIds();
  const health=getHealth();
  const md=health[compMonth]||{};
  const[year,month]=compMonth.split("-").map(Number);
  const days=new Date(year,month,0).getDate();
  const offset=(new Date(year,month-1,1).getDay()+6)%7;
  grid.innerHTML="";
  ["M","T","W","T","F","S","S"].forEach(function(d){ const l=document.createElement("div"); l.className="cal-label"; l.textContent=d; grid.appendChild(l); });
  for(let i=0;i<offset;i++) grid.appendChild(document.createElement("div"));
  for(let day=1;day<=days;day++){
    const dk=compMonth+"-"+pad(day);
    const isToday=dk===todayKey();
    const active=selected.filter(function(id){ return (md[id]||[]).some(function(e){return e.day===dk;}); });
    const btn=document.createElement("button");
    btn.type="button";
    btn.className="cal-day"+(isToday?" today-ring":"");
    btn.style.borderColor="#CBB7A3";
    btn.style.overflow="hidden";
    btn.style.position="relative";
    if(active.length===0){
      btn.style.color="#CBB7A3";
      btn.textContent=String(day);
    } else if(active.length===1){
      const color=TRACKER_COLORS[active[0]]||"#b0977a";
      btn.style.background=color; btn.style.borderColor=color; btn.style.color="white";
      btn.textContent=String(day);
    } else {
      const sw=100/active.length;
      const stops=active.map(function(id,i){ const c=TRACKER_COLORS[id]||"#b0977a"; const l=i*sw; return c+" "+l+"% "+(l+sw)+"%"; });
      btn.style.background="linear-gradient(to right,"+stops.join(",")+")";
      btn.style.borderColor="transparent"; btn.style.color="white"; btn.style.textShadow="0 1px 2px rgba(0,0,0,0.35)";
      btn.textContent=String(day);
    }
    btn.addEventListener("click",function(){ showCompDetail(dk,day,md,selected); });
    grid.appendChild(btn);
  }
}

function showCompDetail(dateKey,day,md,selected){
  const wrap=document.getElementById("comp-detail-wrap");
  const existing=wrap.querySelector(".comp-day-detail");
  if(existing){ existing.remove(); return; }
  const trackers=getTrackers();
  const d=new Date(dateKey);
  const dateLabel=d.toLocaleDateString("default",{weekday:"long",month:"long",day:"numeric"});
  const box=document.createElement("div"); box.className="comp-day-detail";
  let html='<p style="font-weight:600;font-size:13px;color:var(--title-color);margin:0 0 10px;">'+dateLabel+'</p>';
  let hasAny=false;
  selected.forEach(function(id){
    const tracker=trackers.find(function(t){return t.id===id;});
    const entries=(md[id]||[]).filter(function(e){return e.day===dateKey;});
    if(!entries.length) return;
    hasAny=true;
    const color=TRACKER_COLORS[id]||"#b0977a";
    html+='<div style="margin-bottom:8px;"><div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;"><span style="width:10px;height:10px;border-radius:50%;background:'+color+';display:inline-block;"></span><span style="font-size:13px;font-weight:600;color:'+color+';">'+escH(tracker?tracker.name:id)+'</span></div>';
    entries.forEach(function(e){
      const t=new Date(e.date);
      const ts=t.toLocaleTimeString("default",{hour:"2-digit",minute:"2-digit"});
      html+='<p style="font-size:12px;margin:2px 0 2px 16px;color:var(--text-main);">'+ts+(e.severity?" · sev "+e.severity:"")+(e.level?" · level "+e.level:"")+(e.note?" · "+escH(e.note):"")+'</p>';
    });
    html+='</div>';
  });
  if(!hasAny) html+='<p style="font-size:12px;opacity:0.5;">No entries for selected trackers.</p>';
  /* Color legend */
  html+='<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;">';
  selected.forEach(function(id){
    const tracker=trackers.find(function(t){return t.id===id;});
    const color=TRACKER_COLORS[id]||"#b0977a";
    html+='<span style="display:flex;align-items:center;gap:4px;font-size:11px;font-family:var(--font);color:var(--text-main);"><span style="width:8px;height:8px;border-radius:50%;background:'+color+';display:inline-block;"></span>'+escH(tracker?tracker.name:id)+'</span>';
  });
  html+='</div>';
  html+='<button type="button" onclick="this.closest(\'.comp-day-detail\').remove()" style="margin-top:10px;background:none;border:none;font-size:12px;color:var(--button-primary);cursor:pointer;font-family:var(--font);">Close ✕</button>';
  box.innerHTML=html;
  wrap.appendChild(box);
}

/* ── Edit Trackers ── */
document.getElementById("edit-trackers-btn").addEventListener("click",function(){ document.getElementById("edit-panel-overlay").classList.add("open"); renderEditList(); });
document.getElementById("edit-done-btn").addEventListener("click",function(){ document.getElementById("edit-panel-overlay").classList.remove("open"); });
document.getElementById("add-tracker-btn").addEventListener("click",function(){
  const input=document.getElementById("new-tracker-name");
  const name=input.value.trim(); if(!name) return;
  const trackers=getTrackers();
  trackers.push({id:name.toLowerCase().replace(/[^a-z0-9]+/g,"-")+"-"+Date.now(),name:name,type:"calendar",color:"#b0977a"});
  saveTrackers(trackers); input.value=""; buildPage(); renderEditList();
});

function renderEditList(){
  const list=document.getElementById("edit-tracker-list"); list.innerHTML="";
  const trackers=getTrackers();
  trackers.forEach(function(tracker){
    const row=document.createElement("div"); row.className="edit-tracker-row";
    row.innerHTML='<input type="text" class="edit-tracker-input" value="'+escH(tracker.name)+'" data-id="'+tracker.id+'">'+
      '<button class="edit-save-btn" type="button" data-save="'+tracker.id+'">Save</button>'+
      '<button class="edit-delete-btn" type="button" data-del="'+tracker.id+'">✕</button>';
    list.appendChild(row);
  });
  list.querySelectorAll("[data-save]").forEach(function(btn){
    btn.addEventListener("click",function(){
      const id=btn.dataset.save;
      const input=list.querySelector("[data-id='"+id+"']");
      const newName=input?input.value.trim():""; if(!newName) return;
      const trackers=getTrackers();
      const t=trackers.find(function(x){return x.id===id;});
      if(t){ t.name=newName; saveTrackers(trackers); buildPage(); }
    });
  });
  list.querySelectorAll("[data-del]").forEach(function(btn){
    btn.addEventListener("click",function(){
      const id=btn.dataset.del;
      if(!confirm("Delete this tracker and all its data?")) return;
      saveTrackers(getTrackers().filter(function(x){return x.id!==id;}));
      buildPage(); renderEditList();
    });
  });
}

document.addEventListener("DOMContentLoaded",function(){ buildPage(); });
window.renderWeeklyHealth=function(){ buildPage(); };
