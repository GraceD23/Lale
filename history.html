<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /> <!-- Defines the character set so text/symbols display correctly -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <!-- Makes the page scale correctly on iPhone/mobile -->

  <title>History</title> <!-- Browser tab title for the History page -->

  <!-- Base stylesheet:
       Holds resets, base font settings, and shared defaults. -->
  <link rel="stylesheet" href="css/style.css" />

  <!-- Theme stylesheet:
       Holds easy-to-change colors, shadows, borders, and visual design. -->
  <link rel="stylesheet" href="css/theme.css" />

  <!-- Layout stylesheet:
       Controls spacing, widths, and page placement. -->
  <link rel="stylesheet" href="css/layout.css" />

  <!-- Components stylesheet:
       Controls reusable UI pieces like cards, buttons, and menu styling. -->
  <link rel="stylesheet" href="css/components.css" />
</head>

<body>
  <!-- =========================================================
       APP SHELL
       Main wrapper for the full History page.
       ========================================================= -->
  <div id="app-shell" class="app-shell">

    <!-- =======================================================
         TOP BAR
         Contains the top-right hamburger menu button.
         ======================================================= -->
    <header class="top-bar">
      <div class="top-bar-left">
        <!-- Left area intentionally left open for future title/greeting space -->
      </div>

      <div class="top-bar-right">
        <button
          id="hamburger-menu-button"
          class="hamburger-menu-button"
          type="button"
          aria-label="Open navigation menu"
          aria-expanded="false"
          aria-controls="mobile-navigation-drawer"
        >
          <span class="hamburger-line"></span> <!-- Top hamburger line -->
          <span class="hamburger-line"></span> <!-- Middle hamburger line -->
          <span class="hamburger-line"></span> <!-- Bottom hamburger line -->
        </button>
      </div>
    </header>

    <!-- =======================================================
         MOBILE NAVIGATION DRAWER
         Hidden menu panel opened by the hamburger button.
         ======================================================= -->
    <nav
      id="mobile-navigation-drawer"
      class="mobile-navigation-drawer"
      aria-label="Main navigation"
      hidden
    >
      <div class="mobile-navigation-header">
        <h2 class="mobile-navigation-title">Menu</h2> <!-- Menu title shown inside drawer -->
      </div>

      <ul class="mobile-navigation-list">
        <li><a href="index.html">Home</a></li> <!-- Link back to homepage -->
        <li><a href="streaks.html">Streaks</a></li> <!-- Link to full Streaks page -->
        <li><a href="health.html">Health</a></li> <!-- Link to Health page -->
        <li><a href="history.html">History</a></li> <!-- Link to current History page -->
        <li><a href="add.html">Add</a></li> <!-- Link to Add page -->
      </ul>
    </nav>

    <!-- =======================================================
         MAIN PAGE CONTENT
         Holds the History page sections in vertical order.
         ======================================================= -->
    <main class="home-page-main-content">

      <!-- =====================================================
           PAGE TITLE CARD
           Simple page header so the History page has a clear title.
           ===================================================== -->
      <section class="dashboard-card">
        <h1 class="card-title">History</h1> <!-- Main History page title -->
      </section>

      <!-- =====================================================
           MONTH SELECTOR CARD
           This dropdown will later let you choose past months.
           Right now it is starter structure only.
           ===================================================== -->
      <section class="dashboard-card" aria-labelledby="history-month-title">
        <button
          type="button"
          class="dropdown-toggle-button"
          aria-expanded="false"
          aria-controls="history-month-dropdown-content"
        >
          <span id="history-month-title" class="dropdown-title">Month: Current Month</span> <!-- Month selector title -->
          <span class="dropdown-arrow" aria-hidden="true">⌄</span> <!-- Arrow showing dropdown can open/close -->
        </button>

        <div id="history-month-dropdown-content" class="dropdown-content" hidden>
          <p>Past months will appear here later.</p> <!-- Starter placeholder for future month list -->
        </div>
      </section>

      <!-- =====================================================
           HISTORY SUMMARY CARD
           This shows the grouped monthly completed task summary.

           Your rule:
           - if completed once, show task name only
           - if completed more than once, show x#
           - do NOT include streak tasks
           - tapping a task later can open a popup with completion dates
           ===================================================== -->
      <section class="dashboard-card" aria-labelledby="history-summary-title">
        <h2 id="history-summary-title" class="card-title">Completed Tasks</h2> <!-- Section title for monthly task summary -->

        <!-- Summary list container.
             Later, JavaScript will build this dynamically. -->
        <div id="history-summary-list" class="history-summary-list">

          <!-- Example starter history row completed once:
               no x1 shown, based on your rule. -->
          <button type="button" class="history-task-row">
            <span class="history-task-name">Call Dentist</span> <!-- Example task completed once -->
          </button>

          <!-- Example starter history row completed multiple times:
               x2 shown because the task happened more than once. -->
          <button type="button" class="history-task-row">
            <span class="history-task-name">Wash Car</span> <!-- Example repeated task name -->
            <span class="history-task-count">x2</span> <!-- Example repeat count shown only when count is more than 1 -->
          </button>

          <!-- Another example repeated task -->
          <button type="button" class="history-task-row">
            <span class="history-task-name">Take Vitamins</span> <!-- Example repeated task name -->
            <span class="history-task-count">x18</span> <!-- Example monthly repeat count -->
          </button>

        </div>
      </section>

      <!-- =====================================================
           HISTORY DETAIL PANEL
           This slide-up panel will later appear when a history
           row is tapped, showing the completion dates for that
           selected task.

           For now it contains starter placeholder content.
           ===================================================== -->
      <section
        id="history-detail-panel"
        class="review-panel"
        aria-labelledby="history-detail-title"
        hidden
      >
        <div class="review-panel-header">
          <h3 id="history-detail-title" class="review-panel-title">Task History Details</h3> <!-- Title for the tapped task detail panel -->
        </div>

        <div id="history-detail-content" class="review-panel-content">
          <p>Completion dates will appear here.</p> <!-- Starter placeholder text for future task completion dates -->
        </div>

        <div class="review-panel-actions">
          <button id="history-detail-close-button" class="primary-action-button" type="button">Close</button> <!-- Closes the history detail panel -->
        </div>
      </section>
    </main>
  </div>

  <!-- =========================================================
       JAVASCRIPT FILES
       These are loaded at the bottom so the page structure loads first.
       ========================================================= -->
  <script src="js/auth.js"></script> <!-- Handles the iPhone-style numeric passcode lock screen -->
  <script src="js/labels.js"></script> <!-- Holds easy-to-edit visible text labels -->
  <script src="js/config.js"></script> <!-- Holds easy-to-edit site settings -->
  <script src="js/app.js"></script> <!-- Shared page startup logic -->
  <script src="js/menu.js"></script> <!-- Handles hamburger menu open/close behavior -->
  <script src="js/dropdowns.js"></script> <!-- Handles toggle dropdown behavior -->
  <script src="js/review-panel.js"></script> <!-- Reusable slide-up panel behavior -->
  <script src="js/history.js"></script> <!-- Future History page logic for grouped monthly tasks and detail popups -->
</body>
</html>
