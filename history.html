<!DOCTYPE html>
<html lang="en">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>History</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/components-additions.css" />
  <style>
    /* History page font overrides to match homepage style */
    .history-task-name,
    .history-task-count,
    .history-task-row,
    .history-summary-list,
    #history-summary-list,
    .card-title,
    .dropdown-title {
      font-family: "Josefin Sans", sans-serif;
    }
    .history-task-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      background: none;
      border: none;
      border-bottom: 1px solid var(--border-soft);
      padding: 10px 0;
      cursor: pointer;
      font-size: 15px;
      text-align: left;
    }
    .history-task-count {
      opacity: 0.6;
      font-size: 13px;
    }
  </style>
</head>

<body>
  <div id="global-overlay" class="global-overlay" hidden></div>
  <div id="app-shell" class="app-shell">

    <header class="top-bar">
      <div class="top-bar-left"></div>
      <div class="top-bar-right">
        <button id="hamburger-menu-button" class="hamburger-menu-button" type="button"
          aria-label="Open navigation menu" aria-expanded="false" aria-controls="mobile-navigation-drawer">
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
        </button>
      </div>
    </header>

    <nav id="mobile-navigation-drawer" class="mobile-navigation-drawer" aria-label="Main navigation" hidden>
      <div class="mobile-navigation-header">
        <h2 class="mobile-navigation-title">Menu</h2>
      </div>
      <ul class="mobile-navigation-list">
        <li><a href="index.html">Home</a></li>
        <li><a href="streaks.html">Streaks</a></li>
        <li><a href="health.html">Health</a></li>
        <li><a href="history.html">History</a></li>
        <li><a href="notes.html">Notes</a></li>
        <li><a href="add.html">Add</a></li>
        <li><a href="spelling.html">Spelling Quiz</a></li>
        <li><a href="turkish.html">Turkish Stories</a></li>
        <li><a href="conversation.html">Turkish Chat</a></li>
      </ul>
    </nav>

    <main class="home-page-main-content">

      <section class="dashboard-card">
        <h1 class="card-title">History</h1>
      </section>

      <section class="dashboard-card" aria-labelledby="history-month-title">
        <button type="button" class="dropdown-toggle-button" aria-expanded="false"
          aria-controls="history-month-dropdown-content">
          <span id="history-month-title" class="dropdown-title">Month: Current Month</span>
          <span class="dropdown-arrow" aria-hidden="true">⌄</span>
        </button>
        <div id="history-month-dropdown-content" class="dropdown-content" hidden>
          
        </div>
      </section>

      <section class="dashboard-card" aria-labelledby="history-summary-title">
        <h2 id="history-summary-title" class="card-title">Completed Tasks</h2>
        <div id="history-summary-list" class="history-summary-list"></div>
      </section>

      <section id="history-detail-panel" class="review-panel" aria-labelledby="history-detail-title" hidden>
        <div class="review-panel-header">
          <h3 id="history-detail-title" class="review-panel-title">Task History Details</h3>
        </div>
        <div id="history-detail-content" class="review-panel-content">
          
        </div>
        <div class="review-panel-actions">
          <button id="history-detail-close-button" class="primary-action-button" type="button">Close</button>
        </div>
      </section>

    </main>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/labels.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/dropdowns.js"></script>
  <script src="js/review-panel.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/history.js"></script>
</body>
</html>
