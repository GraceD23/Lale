<!DOCTYPE html>
<html lang="en">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Learning</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>
<div id="global-overlay" class="global-overlay" hidden></div>
<div id="app-shell" class="app-shell">

  <header class="top-bar">
    <div class="top-bar-left"></div>
    <div class="top-bar-right">
      <button id="hamburger-menu-button" class="hamburger-menu-button" type="button"
        aria-label="Open navigation menu" aria-expanded="false" aria-controls="mobile-navigation-drawer">
        <span class="hamburger-line" style="display:block;width:100%;height:3px;background-color:#3a2e28;border-radius:2px;"></span>
        <span class="hamburger-line" style="display:block;width:100%;height:3px;background-color:#3a2e28;border-radius:2px;"></span>
        <span class="hamburger-line" style="display:block;width:100%;height:3px;background-color:#3a2e28;border-radius:2px;"></span>
      </button>
    </div>
  </header>

  <nav id="mobile-navigation-drawer" class="mobile-navigation-drawer" aria-label="Main navigation" hidden>
    <div class="mobile-navigation-header">
      <h2 class="mobile-navigation-title">Menu</h2>
    </div>
          <ul class="mobile-navigation-list"></ul>
  </nav>

  <main class="home-page-main-content">

    <section class="dashboard-card" style="margin-bottom:0;">
      <h1 class="card-title">Learning</h1>
    </section>

    <!-- Spelling Quiz -->
    <section class="dashboard-card" style="margin-top:12px;">
      <button
        class="dropdown-toggle-button"
        type="button"
        aria-expanded="false"
        aria-controls="spelling-dropdown"
        id="spelling-toggle"
      >
        <span class="dropdown-title">Spelling Quiz</span>
        <span class="dropdown-arrow" aria-hidden="true">⌄</span>
      </button>
      <div id="spelling-dropdown" hidden style="padding: 12px 4px 4px;">
        <p style="font-size:13px;opacity:0.7;margin:0 0 12px;font-family:'Josefin Sans',sans-serif;">Practice your spelling with a custom word quiz.</p>
        <a href="spelling.html" style="display:inline-block;padding:9px 20px;border-radius:10px;background:#B88C6A;color:white;font-family:'Josefin Sans',sans-serif;font-size:13px;font-weight:600;text-decoration:none;">Open Spelling Quiz →</a>
      </div>
    </section>

    <!-- Turkish Stories -->
    <section class="dashboard-card" style="margin-top:12px;">
      <button
        class="dropdown-toggle-button"
        type="button"
        aria-expanded="false"
        aria-controls="turkish-stories-dropdown"
        id="turkish-stories-toggle"
      >
        <span class="dropdown-title">Turkish Stories</span>
        <span class="dropdown-arrow" aria-hidden="true">⌄</span>
      </button>
      <div id="turkish-stories-dropdown" hidden style="padding: 12px 4px 4px;">
        <p style="font-size:13px;opacity:0.7;margin:0 0 12px;font-family:'Josefin Sans',sans-serif;">Read AI-generated stories in Turkish to improve your reading.</p>
        <a href="turkish.html" style="display:inline-block;padding:9px 20px;border-radius:10px;background:#B88C6A;color:white;font-family:'Josefin Sans',sans-serif;font-size:13px;font-weight:600;text-decoration:none;">Open Turkish Stories →</a>
      </div>
    </section>

    <!-- Turkish Chat -->
    <section class="dashboard-card" style="margin-top:12px;">
      <button
        class="dropdown-toggle-button"
        type="button"
        aria-expanded="false"
        aria-controls="turkish-chat-dropdown"
        id="turkish-chat-toggle"
      >
        <span class="dropdown-title">Turkish Chat</span>
        <span class="dropdown-arrow" aria-hidden="true">⌄</span>
      </button>
      <div id="turkish-chat-dropdown" hidden style="padding: 12px 4px 4px;">
        <p style="font-size:13px;opacity:0.7;margin:0 0 12px;font-family:'Josefin Sans',sans-serif;">Practice conversational Turkish with an AI language partner.</p>
        <a href="conversation.html" style="display:inline-block;padding:9px 20px;border-radius:10px;background:#B88C6A;color:white;font-family:'Josefin Sans',sans-serif;font-size:13px;font-weight:600;text-decoration:none;">Open Turkish Chat →</a>
      </div>
    </section>

  </main>
</div>

<script src="js/auth.js"></script>
<script src="js/menu.js"></script>
<script>
  /* Simple dropdown toggles */
  ["spelling-toggle","turkish-stories-toggle","turkish-chat-toggle"].forEach(function(id) {
    document.getElementById(id).addEventListener("click", function() {
      const targetId = this.getAttribute("aria-controls");
      const content = document.getElementById(targetId);
      const isOpen = !content.hidden;
      content.hidden = isOpen;
      this.setAttribute("aria-expanded", String(!isOpen));
      this.querySelector(".dropdown-arrow").style.transform = isOpen ? "" : "rotate(180deg)";
    });
  });
</script>
<link rel="stylesheet" href="css/components-additions.css">
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./service-worker.js")
        .then(function() { console.log("[SW] Registered"); })
        .catch(function(err) { console.warn("[SW] Registration failed:", err); });
    }
  </script>
</body>
</html>
