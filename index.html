<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google Font: Josefin Sans -->
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <meta charset="UTF-8" /> <!-- Defines the character set so normal text/symbols display correctly -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <!-- Makes the layout scale correctly on iPhone/mobile screens -->

  <title>Productivity Dashboard</title> <!-- Browser tab title -->

  <!-- Main base stylesheet:
       Use this for universal rules like body defaults, font setup, and CSS reset styles. -->
  <link rel="stylesheet" href="css/style.css" />

  <!-- Theme stylesheet:
       Use this for easy visual changes later, such as:
       - background colors
       - box colors
       - border colors
       - shadows
       - background image
       - cozy design styling -->
  <link rel="stylesheet" href="css/theme.css" />

  <!-- Layout stylesheet:
       Use this for changing where things sit on the screen, such as:
       - spacing between boxes
       - side-by-side layout
       - mobile sizing
       - padding and margins -->
  <link rel="stylesheet" href="css/layout.css" />

  <!-- Components stylesheet:
       Use this for reusable UI pieces, such as:
       - cards
       - buttons
       - dropdowns
       - task rows
       - textarea
       - review panel -->
  <link rel="stylesheet" href="css/components.css" />
</head>

<body>
  <!-- =========================================================
       APP SHELL
       This is the main wrapper for the entire Home page.
       All visible homepage content lives inside this container.
       ========================================================= -->
  <div id="app-shell" class="app-shell">

    <!-- =======================================================
         TOP BAR
         This top area contains:
         - the page title area (optional for later)
         - the hamburger menu button on the top right
         - future reserved room for the mascot plugin across the top
         ======================================================= -->
    <header class="top-bar">

      <!-- Left side of the top bar.
           Reserved for future title text, greeting text, or mascot spacing. -->
      <div class="top-bar-left">
        <!-- Intentionally left simple for now so future features can be added without rewriting layout -->
      </div>

      <!-- Right side of the top bar.
           Holds the hamburger menu button that will open the mobile navigation drawer. -->
      <div class="top-bar-right">
        <button
          id="hamburger-menu-button"
          class="hamburger-menu-button"
          type="button"
          aria-label="Open navigation menu"
          aria-expanded="false"
          aria-controls="mobile-navigation-drawer"
        >
          <!-- These three lines form the visual "hamburger" icon.
               You can later replace this with a custom SVG or PNG icon if desired. -->
          <span class="hamburger-line"></span> <!-- Top hamburger line -->
          <span class="hamburger-line"></span> <!-- Middle hamburger line -->
          <span class="hamburger-line"></span> <!-- Bottom hamburger line -->
        </button>
      </div>
    </header>

    <!-- =======================================================
         FUTURE MASCOT AREA
         This is a placeholder section for the mascot plugin later.
         You said the mascot should live across the top of the page.
         Keeping this section separate now means we can add the mascot later
         without restructuring the homepage.
         ======================================================= -->
    <section id="mascot-plugin-area" class="mascot-plugin-area" aria-label="Mascot area">
      <!-- Future mascot plugin will render here -->
    </section>

    <!-- =======================================================
         MOBILE NAVIGATION DRAWER
         This hidden panel will open from the right side when the
         hamburger button is clicked.

         Current planned links:
         - Home
         - Streaks
         - Health
         - History
         - Add
         ======================================================= -->
   <nav
  id="mobile-navigation-drawer"
  class="mobile-navigation-drawer"
  aria-label="Main navigation"
  hidden
>
      <!-- Navigation title area -->
      <div class="mobile-navigation-header">
        <h2 class="mobile-navigation-title">Menu</h2> <!-- Drawer title -->
      </div>

      <!-- Navigation links list -->
      <ul class="mobile-navigation-list">
        <li><a href="index.html">Home</a></li> <!-- Link to homepage -->
        <li><a href="streaks.html">Streaks</a></li> <!-- Link to full streaks page -->
        <li><a href="health.html">Health</a></li> <!-- Link to health tracking page -->
        <li><a href="history.html">History</a></li> <!-- Link to task history page -->
        <li><a href="add.html">Add</a></li> <!-- Link to typed Add page -->
      </ul>
    </nav>

    <!-- =======================================================
         MAIN CONTENT
         This wrapper holds the homepage cards in the order you chose:
         1. Daily Focus + Weekly Tasks side by side
         2. Streaks dropdown
         3. Brain Dump at the bottom
         ======================================================= -->
    <main class="home-page-main-content">

      <!-- =====================================================
           TOP ROW CARDS
           These two cards sit side by side on iPhone:
           - Daily Focus on the left
           - Weekly Tasks on the right

           You said each box should grow naturally on its own height.
           ===================================================== -->
      <section class="top-row-cards" aria-label="Daily and weekly task overview">

        <!-- DAILY FOCUS CARD
             Shows unfinished tasks scheduled for today only.
             When a Daily Focus task is completed, it disappears immediately.
             If left unfinished, that task can later move into Weekly Tasks. -->
        <section id="daily-focus-card" class="dashboard-card daily-focus-card" aria-labelledby="daily-focus-title">
          <h2 id="daily-focus-title" class="card-title">Daily Focus</h2> <!-- Title for today's scheduled unfinished tasks -->

          <!-- Daily task list container.
               JavaScript will later add task rows into this area automatically. -->
          <div id="daily-focus-list" class="task-list">
            <!-- Example starter task row:
                 This is placeholder structure only so styling is easier to build now.
                 It can be removed later when live data is connected. -->
            <div class="task-row">
              <button class="task-check-button" type="button" aria-label="Complete daily task">○</button> <!-- Tap to complete the task -->
              <span class="task-text">Example daily task</span> <!-- The task name text -->
            </div>
          </div>
        </section>

        <!-- WEEKLY TASKS CARD
             Shows weekly tasks that remain here until completed.
             When a weekly task is completed, it disappears immediately.
             If the task is also marked as a streak task, the streak system
             will update separately in JavaScript later. -->
        <section id="weekly-tasks-card" class="dashboard-card weekly-tasks-card" aria-labelledby="weekly-tasks-title">
          <h2 id="weekly-tasks-title" class="card-title">Weekly Tasks</h2> <!-- Title for current weekly task list -->

          <!-- Weekly task list container.
               JavaScript will later add the real weekly tasks here. -->
          <div id="weekly-tasks-list" class="task-list">
            <!-- Example placeholder row for initial structure -->
            <div class="task-row">
              <button class="task-check-button" type="button" aria-label="Complete weekly task">○</button> <!-- Tap to complete the task -->
              <span class="task-text">Example weekly task</span> <!-- The task name text -->
            </div>
          </div>
        </section>
      </section>

      <!-- =====================================================
           STREAKS DROPDOWN CARD
           This is the homepage streaks dropdown that:
           - opens when the title/header is tapped
           - closes when the title/header is tapped again
           - shows tracker name + stars only
           - resets weekly on Sunday at midnight (logic later in JS)
           ===================================================== -->
      <section id="streaks-dropdown-card" class="dashboard-card streaks-dropdown-card" aria-labelledby="streaks-dropdown-title">

        <!-- Dropdown toggle button.
             Clicking this should open/close the dropdown content. -->
        <button
          id="streaks-dropdown-toggle"
          class="dropdown-toggle-button"
          type="button"
          aria-expanded="false"
          aria-controls="streaks-dropdown-content"
        >
          <span id="streaks-dropdown-title" class="dropdown-title">Streaks</span> <!-- Visible dropdown title -->
          <span class="dropdown-arrow" aria-hidden="true">⌄</span> <!-- Arrow indicating toggle direction -->
        </button>

        <!-- Dropdown content area.
             Starts hidden and should appear when the Streaks title is clicked. -->
        <div id="streaks-dropdown-content" class="dropdown-content" hidden>
          <!-- Example streak row.
               Later this will be replaced by JavaScript-generated tracker rows. -->
          <div class="streak-row">
            <span class="streak-name">Vitamin</span> <!-- Name of the streak tracker -->
            <span class="streak-stars" aria-label="Current weekly stars">★★★</span> <!-- Placeholder stars; later easy to replace with your PNG star -->
          </div>
        </div>
      </section>

      <!-- =====================================================
           BRAIN DUMP CARD
           This sits at the bottom of the homepage.
           It is a multi-line input area for typing:
           - tasks
           - health entries
           - notes
           - new category ideas
           - anything else the AI should sort/review
           ===================================================== -->
      <section id="brain-dump-card" class="dashboard-card brain-dump-card" aria-labelledby="brain-dump-title">
        <h2 id="brain-dump-title" class="card-title">Brain Dump</h2> <!-- Section title for quick entry area -->

        <!-- Multi-line text input for freeform Brain Dump text.
             You said this should be a rectangle going longways on the page. -->
        <textarea
          id="brain-dump-input"
          class="brain-dump-input"
          name="brainDump"
          rows="5"
          placeholder="Type here..."
          aria-label="Brain dump input"
        ></textarea>

        <!-- Submit button for sending Brain Dump text into the AI review flow. -->
        <div class="brain-dump-actions">
          <button id="brain-dump-submit-button" class="primary-action-button" type="button">Submit</button> <!-- Sends the Brain Dump text for review -->
        </div>
      </section>
    </main>

    <!-- =======================================================
         SLIDE-UP REVIEW PANEL
         This panel appears after Brain Dump submission.
         It should slide up from the bottom of the screen and show:
         - what the AI detected
         - where the item should go
         - action buttons: confirm, edit, cancel

         It starts hidden.
         ======================================================= -->
    <section
      id="review-panel"
      class="review-panel"
      aria-labelledby="review-panel-title"
      hidden
    >
      <div class="review-panel-header">
        <h3 id="review-panel-title" class="review-panel-title">Review</h3> <!-- Title for the confirmation/review area -->
      </div>

      <!-- Review content area.
           JavaScript will inject AI-detected results here later. -->
      <div id="review-panel-content" class="review-panel-content">
        <p>Detected item details will appear here.</p> <!-- Placeholder text while structure is being built -->
      </div>

      <!-- Action buttons for the review step -->
      <div class="review-panel-actions">
        <button id="review-confirm-button" class="primary-action-button" type="button">Confirm</button> <!-- Saves the detected item -->
        <button id="review-edit-button" class="secondary-action-button" type="button">Edit</button> <!-- Lets you adjust the AI interpretation -->
        <button id="review-cancel-button" class="secondary-action-button" type="button">Cancel</button> <!-- Closes the panel without saving -->
      </div>
    </section>
  </div>

  <!-- =========================================================
       JAVASCRIPT FILES
       These are loaded at the bottom so the page structure loads first.

       Order matters:
       - labels/config first
       - shared app logic next
       - feature modules after that
       ========================================================= -->
  <script src="js/auth.js"></script> <!-- Handles the iPhone-style numeric passcode lock screen -->
  <script src="js/labels.js"></script> <!-- Holds visible text labels and page titles in one editable place -->
  <script src="js/config.js"></script> <!-- Holds editable site behavior settings like reset day and icon paths -->
  <script src="js/app.js"></script> <!-- Shared startup logic for the homepage -->
  <script src="js/menu.js"></script> <!-- Handles hamburger menu behavior -->
  <script src="js/dropdowns.js"></script> <!-- Handles reusable dropdown open/close behavior -->
  <script src="js/review-panel.js"></script> <!-- Handles slide-up review panel open/close behavior -->
  <script src="js/tasks.js"></script> <!-- Handles Daily Focus and Weekly Tasks behavior -->
  <script src="js/streaks.js"></script> <!-- Handles homepage streak display behavior -->
  <script src="js/brain-dump.js"></script> <!-- Handles Brain Dump submission and AI review flow -->
</body>
</html>
