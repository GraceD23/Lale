<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /> <!-- Defines the character set so text/symbols display correctly -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" /> <!-- Makes the page scale correctly on iPhone/mobile -->

  <title>Add</title> <!-- Browser tab title for the Add page -->

  <!-- Google Font: Josefin Sans -->
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- Base stylesheet:
       Holds resets, base font settings, and shared defaults. -->
  <link rel="stylesheet" href="css/style.css" />

  <!-- Theme stylesheet:
       Holds easy-to-change colors, shadows, borders, and visual design. -->
  <link rel="stylesheet" href="css/theme.css" />

  <!-- Layout stylesheet:
       Controls spacing, widths, and page placement. -->
  <link rel="stylesheet" href="css/layout.css" />

  <!-- Components stylesheet:
       Controls reusable UI pieces like cards, buttons, and menu styling. -->
  <link rel="stylesheet" href="css/components.css" />
</head>

<body>
  <!-- =========================================================
       GLOBAL OVERLAY
       Darkens the page when menus or panels are open.
       ========================================================= -->
  <div id="global-overlay" class="global-overlay" hidden></div>

  <!-- =========================================================
       APP SHELL
       Main wrapper for the full Add page.
       ========================================================= -->
  <div id="app-shell" class="app-shell">

    <!-- =======================================================
         TOP BAR
         Contains the top-right hamburger menu button.
         ======================================================= -->
    <header class="top-bar">
      <div class="top-bar-left">
        <!-- Left area intentionally left open for future title/greeting space -->
      </div>

      <div class="top-bar-right">
        <button
          id="hamburger-menu-button"
          class="hamburger-menu-button"
          type="button"
          aria-label="Open navigation menu"
          aria-expanded="false"
          aria-controls="mobile-navigation-drawer"
        >
          <span class="hamburger-line" style="display:block;width:100%;height:3px;background-color:#3a2e28;border-radius:2px;"></span> <!-- Top hamburger line -->
          <span class="hamburger-line" style="display:block;width:100%;height:3px;background-color:#3a2e28;border-radius:2px;"></span> <!-- Middle hamburger line -->
          <span class="hamburger-line" style="display:block;width:100%;height:3px;background-color:#3a2e28;border-radius:2px;"></span> <!-- Bottom hamburger line -->
        </button>
      </div>
    </header>

    <!-- =======================================================
         MOBILE NAVIGATION DRAWER
         Hidden menu panel opened by the hamburger button.
         Solid panel styling is handled in CSS.
         ======================================================= -->
    <nav
      id="mobile-navigation-drawer"
      class="mobile-navigation-drawer"
      aria-label="Main navigation"
      hidden
    >
      <div class="mobile-navigation-header">
        <h2 class="mobile-navigation-title">Menu</h2> <!-- Menu title shown inside drawer -->
      </div>

            <ul class="mobile-navigation-list">
        <li><a href="index.html">Home</a></li>
        <li><a href="work.html">Work</a></li>
        <li><a href="streaks.html">Streaks</a></li>
        <li><a href="health.html">Health</a></li>
        <li><a href="notes.html">Notes</a></li>
        <li><a href="media.html">Media</a></li>
        <li><a href="learning.html">Learning</a></li>
        <li><a href="history.html">Export</a></li>
      </ul>
    </nav>

    <!-- =======================================================
         MAIN PAGE CONTENT
         Holds the Add page sections in vertical order.
         ======================================================= -->
    <main class="home-page-main-content">

      <!-- =====================================================
           PAGE TITLE CARD
           Simple page header for the Add page.
           ===================================================== -->
      <section class="dashboard-card">
        <h1 class="card-title">Add</h1> <!-- Main Add page title -->
      </section>

      <!-- =====================================================
           TYPED COMMAND CARD
           This is the main input area for the Add system.

           Your rule:
           - typed command style
           - asks only relevant questions
           - can create tasks, streaks, health trackers,
             custom logs, and new categories/pages
           ===================================================== -->
      <section class="dashboard-card" aria-labelledby="add-command-title">
        <h2 id="add-command-title" class="card-title">Typed Command</h2>

        <!-- Multi-line typed command input -->
        <textarea
          id="add-command-input"
          class="brain-dump-input"
          name="addCommand"
          rows="5"
          placeholder="Example: create task wash car every Tuesday streak yes"
          aria-label="Add page typed command input"
        ></textarea>

        <!-- Submit button row -->
        <div class="brain-dump-actions">
          <button id="add-command-submit-button" class="primary-action-button" type="button">Submit</button> <!-- Sends typed command into Add review flow -->
        </div>
      </section>

      <!-- =====================================================
           EXISTING CUSTOM ITEMS
           Shows currently created custom boxes, trackers, pages
           ===================================================== -->
      <section class="dashboard-card" aria-labelledby="existing-items-title">
        <h2 id="existing-items-title" class="card-title">Your Custom Items</h2>
        <div id="existing-items-container">
          <p style="opacity:0.5;font-size:13px;">Nothing custom created yet.</p>
        </div>
      </section>

      <!-- ADD REVIEW PANEL
           Solid slide-up panel for the Add page flow.
           This follows the same overlay-safe structure as the
           review panel on the homepage.
           ===================================================== -->
      <section
        id="add-review-panel"
        class="review-panel"
        aria-labelledby="add-review-title"
        hidden
      >
        <div class="review-panel-header">
          <h3 id="add-review-title" class="review-panel-title">Add Review</h3> <!-- Title for Add review panel -->
        </div>

        <div id="add-review-content" class="review-panel-content">
           <!-- Starter placeholder text for Add review content -->
        </div>

        <div class="review-panel-actions">
          <button id="add-review-confirm-button" class="primary-action-button" type="button">Confirm</button> <!-- Confirms the Add action later -->
          <button id="add-review-edit-button" class="secondary-action-button" type="button">Edit</button> <!-- Allows edits later -->
          <button id="add-review-cancel-button" class="secondary-action-button" type="button">Cancel</button> <!-- Closes the Add review panel -->
        </div>
      </section>
    </main>
  </div>

  <!-- =========================================================
       JAVASCRIPT FILES
       These are loaded at the bottom so the page structure loads first.
       ========================================================= -->
  <script src="js/auth.js"></script>
  <script src="js/labels.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/dropdowns.js"></script>
  <script src="js/review-panel.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/brain-parser.js"></script>
  <script src="js/add-system.js"></script>

  <link rel="stylesheet" href="css/components-additions.css" />
</body>
</html>
